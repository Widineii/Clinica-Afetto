spring.profiles.default=local

# Versao exibida no rodape — atualize a cada deploy (formato 2.xxx, max 2.999).
# 3.0 e reservado para a nova cara do projeto; nao usar antes disso.
app.site.version=2.797

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.web.resources.cache.period=86400
spring.thymeleaf.cache=false

# Suporta varios profissionais logados ao mesmo tempo (15+ sem problema)
server.tomcat.threads.max=100
server.tomcat.accept-count=100
server.tomcat.max-connections=200
server.servlet.session.timeout=8h

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Limite de armazenamento Neon para o painel admin (MB). Plano free tipico: 512 = 0,5 GB.
app.neon.storage-limit-mb=512

management.endpoints.web.exposure.include=health,info

# Relatorio mensal: dia 3 gera PDF e apaga mes passado automaticamente
app.relatorio-mensal.dia-fechamento=3
app.relatorio-mensal.dia-remocao-pdf=15
app.relatorio-mensal.cron-dia-3=0 0 3 3 * *
app.relatorio-mensal.cron-dia-15-pdf=0 0 4 15 * *
app.pagamento.mensal-dia-limite=10
app.relatorio-mensal.cron-fallback=0 0 6 * * *
management.endpoint.health.show-details=when_authorized

# Manual — video de demonstracao (embed YouTube ou /videos/arquivo.mp4 em static)
app.manual.video-url=
app.manual.video-titulo=Como usar a Agenda Afetto (tutorial em video)
app.manual.video-descricao=Assista ao passo a passo. A clinica pode substituir por um video gravado (YouTube ou arquivo MP4).
app.manual.whatsapp-numero=553182835857
app.manual.whatsapp-mensagem-padrao=Ola! Preciso de suporte com a Agenda Afetto.

# Foto de perfil do profissional (arquivos em disco)
app.perfil.foto.diretorio=./data/uploads/perfis
app.perfil.foto.tamanho-max-bytes=2097152
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

# WhatsApp Cloud API (Meta) — usa o NUMERO DA CLINICA cadastrado no WhatsApp Manager.
# phone-number-id = ID que a Meta gera para esse numero (nao e outro telefone).
# Render/producao: WHATSAPP_ENABLED=true + token + phone-number-id + template aprovado.
app.whatsapp.meta.enabled=${WHATSAPP_ENABLED:false}
app.whatsapp.meta.access-token=${WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.meta.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.meta.business-account-id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
app.whatsapp.meta.webhook-verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
app.whatsapp.meta.template-lembrete-consulta=${WHATSAPP_TEMPLATE_LEMBRETE:lembrete_consulta}
app.whatsapp.meta.template-language=${WHATSAPP_TEMPLATE_LANGUAGE:pt_BR}
app.whatsapp.meta.numero-clinica-referencia=${WHATSAPP_NUMERO_CLINICA:553182835857}
app.whatsapp.meta.lembrete-vespera-ativo=${WHATSAPP_LEMBRETE_VESPERA:true}
app.whatsapp.meta.lembrete.cron=0 0 9,18 * * *

app.pagamento.prazo-confirmacao-minutos=8
app.pagamento.hora-limite-pagamento-vespera=23:59
app.pagamento.cron-expiracao-ms=30000
app.pagamento.indicacao-dias-limite-pos-atendimento=2
app.agenda.dias-historico-gestao=14
app.agendamento.cron-renovar-series=0 */10 * * * *


# Seguranca — cookie "Lembrar meu acesso" (14 dias). Em producao defina REMEMBER_ME_KEY.
app.seguranca.remember-me-key=${REMEMBER_ME_KEY:afetto-remember-me-dev-key-trocar-em-producao}
app.seguranca.remember-me-validade-dias=14

# Gestao financeira (Polyana) — receita PIX e painel com graficos
clinica.financeiro.polyana.enabled=true
