spring.profiles.default=local

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Suporta varios profissionais logados ao mesmo tempo (15+ sem problema)
server.tomcat.threads.max=100
server.tomcat.accept-count=100
server.tomcat.max-connections=200
server.servlet.session.timeout=8h

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Limite de armazenamento Neon para o painel admin (MB). Plano free tipico: 512 = 0,5 GB.
app.neon.storage-limit-mb=512

management.endpoints.web.exposure.include=health,info

# Relatorio mensal: dia 3 gera PDF e apaga mes passado automaticamente
app.relatorio-mensal.dia-fechamento=3
app.relatorio-mensal.dia-remocao-pdf=10
app.relatorio-mensal.cron-dia-3=0 0 3 3 * *
app.relatorio-mensal.cron-dia-10-pdf=0 0 4 10 * *
app.relatorio-mensal.cron-fallback=0 0 6 * * *
management.endpoint.health.show-details=when_authorized

# Manual — video de demonstracao (embed YouTube ou /videos/arquivo.mp4 em static)
app.manual.video-url=
app.manual.video-titulo=Como usar a Agenda Afetto (video de amostra)
app.manual.video-descricao=Passo a passo em video. Troque o link quando tiver o tutorial gravado pela clinica.
app.manual.whatsapp-numero=5537998550994
app.manual.whatsapp-mensagem-padrao=Ola! Preciso de suporte com a Agenda Afetto.

app.pagamento.prazo-confirmacao-minutos=5
app.pagamento.hora-limite-pagamento-vespera=23:59
app.pagamento.cron-expiracao-ms=30000
