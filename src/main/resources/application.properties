spring.profiles.default=local

# Versao exibida no rodape — atualize a cada deploy (formato 2.xxx, max 2.999).
# 3.0 e reservado para a nova cara do projeto; nao usar antes disso.
app.site.version=2.487

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.web.resources.cache.period=86400
spring.thymeleaf.cache=false

# Suporta varios profissionais logados ao mesmo tempo (15+ sem problema)
server.tomcat.threads.max=100
server.tomcat.accept-count=100
server.tomcat.max-connections=200
server.servlet.session.timeout=8h

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Limite de armazenamento Neon para o painel admin (MB). Plano free tipico: 512 = 0,5 GB.
app.neon.storage-limit-mb=512

management.endpoints.web.exposure.include=health,info

# Relatorio mensal: dia 3 gera PDF e apaga mes passado automaticamente
app.relatorio-mensal.dia-fechamento=3
app.relatorio-mensal.dia-remocao-pdf=15
app.relatorio-mensal.cron-dia-3=0 0 3 3 * *
app.relatorio-mensal.cron-dia-15-pdf=0 0 4 15 * *
app.pagamento.mensal-dia-limite=15
app.relatorio-mensal.cron-fallback=0 0 6 * * *
management.endpoint.health.show-details=when_authorized

# Manual — video de demonstracao (embed YouTube ou /videos/arquivo.mp4 em static)
app.manual.video-url=
app.manual.video-titulo=Como usar a Agenda Afetto (tutorial em video)
app.manual.video-descricao=Assista ao passo a passo. A clinica pode substituir por um video gravado (YouTube ou arquivo MP4).
app.manual.whatsapp-numero=5537998550994
app.manual.whatsapp-mensagem-padrao=Ola! Preciso de suporte com a Agenda Afetto.

app.pagamento.prazo-confirmacao-minutos=8
app.pagamento.hora-limite-pagamento-vespera=23:59
app.pagamento.cron-expiracao-ms=30000
app.agendamento.cron-renovar-series=0 */10 * * * *

# Gestao financeira (Polyana) — receita PIX e painel com graficos
clinica.financeiro.polyana.enabled=true
