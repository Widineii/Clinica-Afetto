<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title th:text="${card.nomeExibicao + ' - Meus pacientes'}">Paciente - Agenda Afetto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <th:block th:replace="~{fragments/estilos-notificacao-relatorio :: css}"></th:block>
    <th:block th:replace="~{fragments/site-menu-principal :: estilos}"></th:block>
    <th:block th:replace="~{fragments/paciente-caderno-detalhe :: estilos}"></th:block>
    <th:block th:replace="~{fragments/afetto-tema :: css}"></th:block>
</head>
<body>
<div class="container-fluid app-shell afetto-page-shell">
    <th:block th:replace="~{fragments/site-menu-principal :: barra(paginaAtiva='PACIENTES')}"></th:block>

    <div th:if="${sucesso}" class="alert alert-success shell-card" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger shell-card" th:text="${erro}"></div>

    <div class="card shell-card">
        <div class="card-body p-4">
            <div class="mb-3">
                <a th:href="@{/agendamentos/meus-pacientes}" class="btn btn-sm btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-1" aria-hidden="true"></i>
                    Voltar para pacientes
                </a>
            </div>

            <div class="paciente-detalhe-hero mb-4">
                <div class="d-flex flex-wrap align-items-start justify-content-between gap-3">
                    <div>
                        <h1 class="h5 mb-2 paciente-detalhe-nome" th:text="${card.nomeExibicao}">Cliente</h1>
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <span class="paciente-meta">
                                <i class="fa-solid fa-phone me-1" aria-hidden="true"></i>
                                <span th:text="${card.telefoneRotulo}">—</span>
                            </span>
                            <span class="badge paciente-badge"
                                  th:text="${card.totalConsultas + (card.totalConsultas == 1 ? ' consulta' : ' consultas')}">1 consulta</span>
                            <span class="badge paciente-badge paciente-badge--tipo"
                                  th:text="${card.recorrenciaRotulo}">Semanal</span>
                        </div>
                        <p class="paciente-meta mb-0 mt-2">
                            <span th:if="${card.proximaConsultaRotulo != null}">
                                Próxima: <strong th:text="${card.proximaConsultaRotulo}">—</strong>
                            </span>
                            <span th:if="${card.proximaConsultaRotulo == null and card.ultimaConsultaRotulo != null}">
                                Última: <strong th:text="${card.ultimaConsultaRotulo}">—</strong>
                            </span>
                        </p>
                    </div>
                    <a th:if="${card.whatsappUrl != null}"
                       th:href="${card.whatsappUrl}"
                       class="btn btn-success btn-sm flex-shrink-0"
                       target="_blank"
                       rel="noopener noreferrer">
                        <i class="fa-brands fa-whatsapp me-1" aria-hidden="true"></i>
                        WhatsApp
                    </a>
                </div>
            </div>

            <div class="paciente-caderno-resumo" th:if="${resumoCaderno != null}">
                <div class="paciente-caderno-resumo__item">
                    <span class="paciente-caderno-resumo__valor" th:text="${resumoCaderno.sessoesRealizadas}">0</span>
                    <span class="paciente-caderno-resumo__rotulo"
                          th:text="${resumoCaderno.sessoesRealizadas == 1 ? 'Sessão realizada' : 'Sessões realizadas'}">
                        Sessões realizadas
                    </span>
                </div>
                <div class="paciente-caderno-resumo__item">
                    <span class="paciente-caderno-resumo__valor paciente-caderno-resumo__valor--moeda"
                          th:text="${resumoCaderno.totalLiquidoRecebido}">R$ 0,00</span>
                    <span class="paciente-caderno-resumo__rotulo">Total líquido recebido</span>
                </div>
                <div class="paciente-caderno-resumo__item">
                    <span class="paciente-caderno-resumo__valor" th:text="${resumoCaderno.sessoesCanceladas}">0</span>
                    <span class="paciente-caderno-resumo__rotulo"
                          th:text="${resumoCaderno.sessoesCanceladas == 1 ? 'Sessão cancelada' : 'Sessões canceladas'}">
                        Sessões canceladas
                    </span>
                </div>
            </div>

            <div class="pacientes-caderno-painel mb-4"
                 th:if="${resumoSemanalCaderno != null and !resumoSemanalCaderno.vazio}">
                <div class="pacientes-caderno-painel__titulo">Resumo automático da semana</div>
                <p class="pacientes-caderno-painel__sub mb-2"
                   th:text="${'Período ' + resumoSemanalCaderno.periodoRotulo}">
                    Período
                </p>
                <ul class="mb-0">
                    <li th:each="linha : ${resumoSemanalCaderno.linhas}" th:text="${linha}">Resumo</li>
                </ul>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-3">
                <form th:action="@{/agendamentos/meus-pacientes/{id}/anotacoes/exportar-pdf(id=${card.cardId})}"
                      method="post"
                      target="_blank"
                      class="d-inline">
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-outline-secondary">
                        <i class="fa-solid fa-file-pdf me-1" aria-hidden="true"></i>
                        Exportar anotações (PDF)
                    </button>
                </form>
            </div>

            <div class="paciente-detalhe-corpo"
                 th:replace="~{fragments/paciente-caderno-detalhe :: corpo(card=${card}, anotacoes=${anotacoesCaderno}, salas=${salas}, horariosDisponiveis=${horariosDisponiveis})}">
            </div>
        </div>
    </div>
</div>

<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}">

<th:block th:replace="~{fragments/paciente-caderno-detalhe :: modais}"></th:block>
<th:block th:replace="~{fragments/site-menu-principal :: modais-conta}"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="~{fragments/paciente-caderno-detalhe :: scripts(cardId=${card.cardId}, anotacoesIniciais=${anotacoesCaderno}, nomePaciente=${card.nomeExibicao})}"></th:block>
<th:block th:replace="~{fragments/site-menu-principal :: scripts}"></th:block>
</body>
</html>
