<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento | Agenda Afetto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        .comprovante-polyana-aviso {
            background: linear-gradient(180deg, #fff9e6 0%, #fff3cd 100%);
            box-shadow: 0 4px 14px rgba(245, 176, 0, 0.25);
        }
        .comprovante-polyana-aviso .text-primary {
            color: #0d6efd !important;
        }
    </style>
    <th:block th:replace="~{fragments/pagamento-consulta :: pix-checkout-css}"></th:block>
</head>
<body class="bg-light"
      th:attr="data-pagamento-auto-sync=${!pagamentoService.modoTestePagamento()},
               data-sincronizar-pagamento-id=${agendamento.esperandoConfirmacaoPagamento ? agendamento.id : null}">
<input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
<div class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div th:replace="~{fragments/pagamento-consulta :: corpo-pagamento-consulta(agendamento=${agendamento})}"></div>
            <div class="text-center">
                <a th:href="@{/agendamentos/dashboard}" class="btn btn-link mt-3">Voltar para agenda</a>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/pagamento-consulta :: copiar-chave-script}"></th:block>
<th:block th:replace="~{fragments/pagamento-consulta :: auto-sincronizar-pix-script}"></th:block>
</body>
</html>
