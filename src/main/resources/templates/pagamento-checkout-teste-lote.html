<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout lote (teste)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 text-center">
            <span class="badge text-bg-warning mb-3">Modo teste</span>
            <h1 class="h4 mb-2" th:text="${tituloLote}">PIX em lote</h1>
            <p class="text-muted small mb-3">Confirme uma vez para marcar todas as consultas como pagas.</p>

            <p class="h5 mb-3" th:text="${totalTaxaLote}">R$ 105,00</p>
            <p class="small text-muted mb-3"
               th:text="${consultasLote.size() + ' consulta(s)'}">3 consulta(s)</p>

            <form th:action="${acaoConfirmar}" method="post" class="d-grid">
                <th:block th:replace="~{fragments/csrf :: token}"></th:block>
                <input type="hidden" name="order" th:value="${orderNsu}">
                <button type="submit" class="btn btn-success btn-lg" th:text="${rotuloBotao}">Confirmar PIX (teste)</button>
            </form>

            <p class="small text-muted mt-3 mb-0">Pedido: <span th:text="${orderNsu}">dia-1-abc</span></p>
        </div>
    </div>
</div>
</body>
</html>
