<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX em lote | Demonstração</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <th:block th:replace="~{fragments/pagamento-demo-local :: checkout-demo-css}"></th:block>
</head>
<body class="demo-checkout-page">
<div class="demo-checkout-card card">
    <div class="demo-checkout-top">
        <span class="badge demo-badge-demo mb-2">Demonstração local</span>
        <div class="marca">InfinitePay</div>
        <div class="sub" th:text="${tituloLote}">PIX em lote</div>
    </div>
    <div class="demo-checkout-body text-center">
        <p class="text-muted small mb-1">Total do PIX</p>
        <p class="demo-checkout-valor mb-2" th:text="${totalTaxaLote}">R$ 105,00</p>
        <p class="small text-muted mb-4"
           th:text="${consultasLote.size() + ' consulta(s) incluída(s) neste pagamento'}">3 consulta(s)</p>

        <div class="demo-pix-box mb-4">
            <div class="demo-pix-icon">PIX</div>
            <p class="mb-1 fw-semibold">Um PIX para várias consultas</p>
            <p class="small text-muted mb-0">
                Confirme abaixo para simular o pagamento de todas as consultas listadas.
            </p>
        </div>

        <form th:action="${acaoConfirmar}" method="post" class="d-grid gap-2">
            <th:block th:replace="~{fragments/csrf :: token}"></th:block>
            <input type="hidden" name="order" th:value="${orderNsu}">
            <button type="submit" class="btn btn-success btn-lg demo-btn-pix" th:text="${rotuloBotao}">
                Confirmar pagamento PIX
            </button>
        </form>

        <a th:href="@{/agendamentos/meus-pagamentos}" class="btn btn-link btn-sm mt-3">Voltar para Meus pagamentos</a>
    </div>
</div>
</body>
</html>
