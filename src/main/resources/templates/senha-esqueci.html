<!DOCTYPE html>
<html lang="pt-BR" class="login-page-root" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Esqueci minha senha | Agenda Afetto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <th:block th:replace="~{fragments/afetto-paleta :: css}"></th:block>
    <link rel="stylesheet" th:href="@{/css/login-page.css(v=18)}">
    <link th:if="${@environment.acceptsProfiles('local')}" rel="stylesheet" th:href="@{/css/login-page-local.css(v=6)}">
</head>
<body class="login-page" th:classappend="${@environment.acceptsProfiles('local')} ? ' login-page--local-compact' : ''">
<div class="page-shell">
    <div class="login-shell login-shell--senha">
        <section class="form-side form-side--full">
            <div class="login-panel">
                <div class="access-badge">
                    <span class="access-badge__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                    </span>
                    <span class="access-badge__text">Recuperar senha</span>
                </div>

                <p class="form-subtitle">Informe seu <span class="form-subtitle__accent">login e e-mail</span> para receber um código.</p>

                <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                <form th:action="@{/senha/esqueci}" th:object="${solicitarCodigoSenhaForm}" method="post">
                    <th:block th:replace="~{fragments/csrf :: token}"></th:block>

                    <label class="field-label" for="login">Login do sistema</label>
                    <div class="input-wrap">
                        <span class="input-wrap__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-4 3.6-6 7-6s7 2 7 6"/></svg>
                        </span>
                        <input id="login" type="text" class="form-control" th:field="*{login}"
                               placeholder="Digite seu login" required autocomplete="username">
                    </div>

                    <label class="field-label" for="email">E-mail</label>
                    <div class="input-wrap">
                        <span class="input-wrap__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
                        </span>
                        <input id="email" type="email" class="form-control" th:field="*{email}"
                               placeholder="Digite seu e-mail" required autocomplete="email">
                    </div>

                    <p class="forgot-hint">
                        Enviaremos um código de 6 dígitos para redefinir sua senha.
                        Na primeira vez, o e-mail informado ficará vinculado ao seu login.
                    </p>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-enter">Enviar código</button>
                        <a class="btn btn-outline-secondary" th:href="@{/login}">Voltar ao login</a>
                    </div>
                    <p class="login-panel__versao mb-0" th:text="|v${versaoSite}|">v2.825</p>
                </form>
            </div>
        </section>
    </div>
</div>
<style>
    .login-shell--senha { grid-template-columns: 1fr; max-width: 520px; margin: 0 auto; }
    .form-side--full { width: 100%; }
</style>
</body>
</html>
