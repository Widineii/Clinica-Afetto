<!DOCTYPE html>
<html lang="pt-BR" class="login-page-root" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Redefinir senha | Agenda Afetto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <th:block th:replace="~{fragments/afetto-paleta :: css}"></th:block>
    <link rel="stylesheet" th:href="@{/css/login-page.css(v=18)}">
    <link th:if="${@environment.acceptsProfiles('local')}" rel="stylesheet" th:href="@{/css/login-page-local.css(v=6)}">
</head>
<body class="login-page" th:classappend="${@environment.acceptsProfiles('local')} ? ' login-page--local-compact' : ''">
<div class="page-shell">
    <div class="login-shell login-shell--senha">
        <section class="form-side form-side--full">
            <div class="login-panel">
                <div class="access-badge">
                    <span class="access-badge__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                    </span>
                    <span class="access-badge__text">Nova senha</span>
                </div>

                <p class="form-subtitle">Digite o <span class="form-subtitle__accent">código recebido</span> e escolha uma nova senha.</p>

                <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
                <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                <form th:action="@{/senha/codigo}" th:object="${redefinirSenhaCodigoForm}" method="post">
                    <th:block th:replace="~{fragments/csrf :: token}"></th:block>

                    <label class="field-label" for="login">Login do sistema</label>
                    <div class="input-wrap">
                        <input id="login" type="text" class="form-control" th:field="*{login}"
                               placeholder="Seu login" required autocomplete="username" readonly>
                    </div>

                    <label class="field-label" for="codigo">Código (6 dígitos)</label>
                    <div class="input-wrap">
                        <input id="codigo" type="text" class="form-control" th:field="*{codigo}"
                               placeholder="000000" required maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                               autocomplete="one-time-code">
                    </div>

                    <label class="field-label" for="novaSenha">Nova senha</label>
                    <div class="input-wrap input-wrap--password">
                        <input id="novaSenha" type="password" class="form-control" th:field="*{novaSenha}"
                               placeholder="Mínimo 4 caracteres" required minlength="4" autocomplete="new-password">
                    </div>

                    <label class="field-label" for="confirmarSenha">Confirmar nova senha</label>
                    <div class="input-wrap input-wrap--password">
                        <input id="confirmarSenha" type="password" class="form-control" th:field="*{confirmarSenha}"
                               placeholder="Repita a nova senha" required minlength="4" autocomplete="new-password">
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-enter">Redefinir senha</button>
                        <a class="btn btn-outline-secondary" th:href="@{/senha/esqueci}">Solicitar novo código</a>
                        <a class="btn btn-link" th:href="@{/login}">Voltar ao login</a>
                    </div>
                    <p class="login-panel__versao mb-0" th:text="|v${versaoSite}|">v2.825</p>
                </form>
            </div>
        </section>
    </div>
</div>
<style>
    .login-shell--senha { grid-template-columns: 1fr; max-width: 520px; margin: 0 auto; }
    .form-side--full { width: 100%; }
</style>
</body>
</html>
