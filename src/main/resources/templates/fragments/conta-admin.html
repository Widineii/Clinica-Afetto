<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     th:if="${podeGerenciarContaAdmin != null and podeGerenciarContaAdmin}"
     class="modal fade"
     id="contaAdminModal"
     tabindex="-1"
     aria-labelledby="contaAdminModalTitulo"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <div>
                    <h2 class="modal-title h5 mb-1" id="contaAdminModalTitulo">Minha conta</h2>
                    <p class="text-muted small mb-0">Dados de acesso e preferências do administrador.</p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body pt-3">
                <div class="rounded-3 border p-3 mb-3 conta-admin-resumo">
                    <p class="small text-muted mb-1">Nome</p>
                    <p class="fw-semibold mb-2" th:text="${usuarioLogado != null ? usuarioLogado.nome : '—'}">Administrador</p>
                    <p class="small text-muted mb-1">Login</p>
                    <p class="fw-semibold mb-0 font-monospace" th:text="${usuarioLogado != null ? usuarioLogado.login : '—'}">admin</p>
                </div>

                <div class="mb-3">
                    <p class="small fw-semibold text-muted text-uppercase mb-2" style="letter-spacing: 0.08em;">Aparência</p>
                    <th:block th:replace="~{fragments/afetto-tema :: seletor}"></th:block>
                    <p class="small text-muted mt-2 mb-0">A escolha fica salva neste navegador.</p>
                </div>

                <div th:if="${podeTrocarPropriaSenha}" class="d-grid">
                    <button type="button"
                            class="btn btn-outline-dark"
                            data-bs-dismiss="modal"
                            data-bs-toggle="modal"
                            data-bs-target="#trocarSenhaContaModal">
                        <i class="fa-solid fa-lock me-1" aria-hidden="true"></i>
                        Alterar senha
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
