<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="estilos">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link th:href="@{/css/afetto-site-menu.css(v=3)}" rel="stylesheet">
    </th:block>
</head>
<body>
<header th:fragment="barra (paginaAtiva)"
        class="afetto-site-nav mb-4"
        id="afettoSiteNav"
        th:with="ehProfissional=${isAdmin != true and isDonaClinica != true},
                 qtdPendencias=${resumoPendenciasPagamento != null ? resumoPendenciasPagamento.quantidade : 0},
                 temPendencias=${ehProfissional and qtdPendencias > 0},
                 pagina=${paginaAtiva != null ? paginaAtiva : ''}">
    <div class="afetto-site-nav__backdrop" id="afettoSiteNavBackdrop" aria-hidden="true"></div>
    <div class="afetto-site-nav__inner">
        <button type="button"
                class="afetto-site-nav__hamburger"
                id="afettoSiteNavToggle"
                aria-expanded="false"
                aria-controls="afettoSiteNavMenu"
                aria-label="Abrir menu de navegação">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>

        <div class="afetto-site-nav__brand">
            <img class="afetto-site-nav__logo"
                 th:src="@{/images/afetto-logo.png}"
                 alt="Afetto Psicologia e Saúde">
            <span class="afetto-site-nav__brand-divider" aria-hidden="true"></span>
            <div class="afetto-site-nav__brand-copy">
                <p class="afetto-site-nav__clinica mb-0">Clínica Afetto</p>
                <p class="afetto-site-nav__kicker mb-0">Sistema de agendamento</p>
                <p class="afetto-site-nav__saudacao mb-0"
                   th:if="${usuarioLogado != null}">
                    Olá, <strong th:text="${usuarioLogado.nome}">Nome</strong>
                </p>
            </div>
        </div>

        <nav class="afetto-site-nav__menu" id="afettoSiteNavMenu" aria-label="Menu principal">
            <a th:href="@{/agendamentos/dashboard}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'AGENDA'} ? ' is-active' : ''"
               th:attr="aria-current=${pagina == 'AGENDA'} ? 'page' : null">
                <i class="afetto-site-nav__item-icon fa-solid fa-calendar-days" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Agenda</span>
            </a>

            <a th:if="${ehProfissional}"
               th:href="@{/agendamentos/dashboard#meus-agendamentos}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'AGENDAMENTOS'} ? ' is-active' : ''">
                <i class="afetto-site-nav__item-icon fa-solid fa-users" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Pacientes</span>
            </a>

            <a th:if="${podeGerenciarEquipe}"
               th:href="@{/agendamentos/central-profissionais}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'CENTRAL'} ? ' is-active' : ''"
               th:attr="aria-current=${pagina == 'CENTRAL'} ? 'page' : null">
                <i class="afetto-site-nav__item-icon fa-solid fa-users-gear" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Central</span>
            </a>

            <a th:if="${ehProfissional}"
               th:href="@{/agendamentos/meus-pagamentos}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'PAGAMENTOS'} ? ' is-active' : ''"
               th:attr="aria-current=${pagina == 'PAGAMENTOS'} ? 'page' : null">
                <i class="afetto-site-nav__item-icon fa-solid fa-credit-card" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Pagamentos</span>
            </a>

            <a th:if="${podeAcessarGestaoFinanceira}"
               th:href="@{/agendamentos/financeiro}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'FINANCEIRO'} ? ' is-active' : ''"
               th:attr="aria-current=${pagina == 'FINANCEIRO'} ? 'page' : null">
                <i class="afetto-site-nav__item-icon fa-solid fa-chart-line" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Financeiro</span>
            </a>

            <a th:if="${podeVerRelatorioProprio != null and podeVerRelatorioProprio}"
               th:href="@{/agendamentos/meu-relatorio}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'RELATORIO'} ? ' is-active' : ''"
               th:attr="aria-current=${pagina == 'RELATORIO'} ? 'page' : null">
                <i class="afetto-site-nav__item-icon fa-solid fa-file-lines" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Relatórios</span>
            </a>

            <a th:href="@{/agendamentos/manual}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'MANUAL'} ? ' is-active' : ''"
               th:attr="aria-current=${pagina == 'MANUAL'} ? 'page' : null">
                <i class="afetto-site-nav__item-icon fa-solid fa-book-open" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Manual</span>
            </a>

            <button th:if="${temPendencias and pagina == 'AGENDA'}"
                    type="button"
                    class="afetto-site-nav__item"
                    data-bs-toggle="modal"
                    data-bs-target="#pendenciasPagamentoModal"
                    title="Pagamentos em aberto">
                <i class="afetto-site-nav__item-icon fa-solid fa-bell" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Pendências</span>
                <span class="afetto-site-nav__badge" th:text="${qtdPendencias}">1</span>
            </button>
            <a th:if="${temPendencias and pagina != 'AGENDA'}"
               th:href="@{/agendamentos/meus-pagamentos}"
               class="afetto-site-nav__item"
               title="Pagamentos em aberto">
                <i class="afetto-site-nav__item-icon fa-solid fa-bell" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Pendências</span>
                <span class="afetto-site-nav__badge" th:text="${qtdPendencias}">1</span>
            </a>

            <button th:if="${podeTrocarPropriaSenha != null and podeTrocarPropriaSenha and pagina == 'AGENDA'}"
                    type="button"
                    class="afetto-site-nav__item"
                    data-bs-toggle="modal"
                    data-bs-target="#trocarSenhaModal"
                    title="Alterar senha de acesso">
                <i class="afetto-site-nav__item-icon fa-solid fa-lock" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Alterar senha</span>
            </button>
            <a th:if="${podeTrocarPropriaSenha != null and podeTrocarPropriaSenha and pagina != 'AGENDA'}"
               th:href="@{/agendamentos/dashboard(alterarSenha=true)}"
               class="afetto-site-nav__item"
               title="Alterar senha de acesso">
                <i class="afetto-site-nav__item-icon fa-solid fa-lock" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Alterar senha</span>
            </a>

            <a th:if="${isAdmin}"
               th:href="@{/agendamentos/admin/uso-banco}"
               class="afetto-site-nav__item"
               th:classappend="${pagina == 'USO_BANCO'} ? ' is-active' : ''">
                <i class="afetto-site-nav__item-icon fa-solid fa-database" aria-hidden="true"></i>
                <span class="afetto-site-nav__item-label">Banco</span>
            </a>
        </nav>

        <div class="afetto-site-nav__utils">
            <span class="afetto-site-nav__utils-divider d-none d-xl-block" aria-hidden="true"></span>
            <button th:if="${totalNovidadesVisiveis != null and totalNovidadesVisiveis > 0 and pagina == 'AGENDA'}"
                    type="button"
                    class="afetto-site-nav__item afetto-site-nav__item--compact d-none d-md-inline-flex"
                    data-bs-toggle="modal"
                    data-bs-target="#novidadesModal"
                    title="Novidades do sistema">
                <i class="afetto-site-nav__item-icon fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
                <span class="afetto-site-nav__badge" th:text="${totalNovidadesVisiveis}">1</span>
            </button>
            <th:block th:replace="~{fragments/notificacao-relatorio-mensal :: sino}"></th:block>

            <div class="dropdown afetto-site-nav__perfil-wrap" th:if="${usuarioLogado != null}">
                <button type="button"
                        class="afetto-site-nav__perfil-btn dropdown-toggle"
                        data-bs-toggle="dropdown"
                        data-bs-display="static"
                        aria-expanded="false"
                        th:attr="aria-label=${'Menu de ' + usuarioLogado.nome}">
                    <span class="afetto-site-nav__perfil-avatar" aria-hidden="true">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <i class="fa-solid fa-chevron-down afetto-site-nav__perfil-chevron" aria-hidden="true"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li class="dropdown-header text-truncate" th:text="${usuarioLogado.nome}">Usuário</li>
                    <li th:if="${podeTrocarPropriaSenha != null and podeTrocarPropriaSenha and pagina == 'AGENDA'}">
                        <button type="button" class="dropdown-item" data-bs-toggle="modal" data-bs-target="#trocarSenhaModal">
                            Alterar senha
                        </button>
                    </li>
                    <li th:if="${podeTrocarPropriaSenha != null and podeTrocarPropriaSenha and pagina != 'AGENDA'}">
                        <a class="dropdown-item" th:href="@{/agendamentos/dashboard(alterarSenha=true)}">Alterar senha</a>
                    </li>
                    <li><a class="dropdown-item" th:href="@{/agendamentos/manual}">Manual</a></li>
                </ul>
            </div>

            <form th:action="@{/logout}" method="post" class="afetto-site-nav__sair-form">
                <th:block th:replace="~{fragments/csrf :: token}"></th:block>
                <button type="submit" class="afetto-site-nav__sair" title="Encerrar sessão">
                    <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                    <span>Sair</span>
                </button>
            </form>
        </div>
    </div>
</header>

<th:block th:fragment="scripts">
<script>
(function () {
    var nav = document.getElementById('afettoSiteNav');
    var toggle = document.getElementById('afettoSiteNavToggle');
    var menu = document.getElementById('afettoSiteNavMenu');
    var backdrop = document.getElementById('afettoSiteNavBackdrop');
    if (!nav || !toggle || !menu) {
        return;
    }

    function isMobileNav() {
        return window.matchMedia('(max-width: 1199.98px)').matches;
    }

    function setMenuOpen(aberto) {
        nav.classList.toggle('is-menu-open', aberto);
        toggle.setAttribute('aria-expanded', aberto ? 'true' : 'false');
        toggle.setAttribute('aria-label', aberto ? 'Fechar menu de navegação' : 'Abrir menu de navegação');
        var icon = toggle.querySelector('i');
        if (icon) {
            icon.className = aberto ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
        }
        if (backdrop) {
            backdrop.setAttribute('aria-hidden', aberto ? 'false' : 'true');
        }
        if (aberto) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = '';
        }
    }

    function fecharMenu() {
        if (nav.classList.contains('is-menu-open')) {
            setMenuOpen(false);
        }
    }

    toggle.addEventListener('click', function () {
        if (!isMobileNav()) {
            return;
        }
        setMenuOpen(!nav.classList.contains('is-menu-open'));
    });

    if (backdrop) {
        backdrop.addEventListener('click', fecharMenu);
    }

    menu.querySelectorAll('a.afetto-site-nav__item').forEach(function (link) {
        link.addEventListener('click', fecharMenu);
    });

    menu.querySelectorAll('button.afetto-site-nav__item').forEach(function (btn) {
        btn.addEventListener('click', function () {
            if (btn.hasAttribute('data-bs-toggle')) {
                fecharMenu();
            }
        });
    });

    document.addEventListener('keydown', function (evento) {
        if (evento.key === 'Escape') {
            fecharMenu();
        }
    });

    window.addEventListener('resize', function () {
        if (!isMobileNav()) {
            fecharMenu();
        }
    });
})();
</script>
</th:block>
</body>
</html>
