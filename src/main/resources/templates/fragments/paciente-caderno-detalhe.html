<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="estilos">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(10, 135, 133, 0.12), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef4f7 100%);
        }
        .app-shell { --afetto-shell-max: 1200px; }
        .shell-card {
            border: 0;
            border-radius: 24px;
            background: #fff;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }
        .paciente-detalhe-hero {
            background: var(--afetto-gradient-hero);
            color: #fff;
            border-radius: 18px;
            padding: 1rem 1.15rem;
        }
        .paciente-detalhe-hero .paciente-meta { color: rgba(255, 255, 255, 0.88); }
        .paciente-detalhe-hero .paciente-badge {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
        }
        .paciente-detalhe-hero .paciente-badge--tipo {
            background: rgba(255, 255, 255, 0.08);
        }
        .paciente-detalhe-nome { color: #fff; font-weight: 700; }
        .paciente-meta { color: #64748b; font-size: 0.78rem; }
        .paciente-badge {
            background: #ecfdf5;
            color: #0f766e;
            border: 1px solid #99f6e4;
            font-weight: 600;
            font-size: 0.68rem;
            padding: 0.2rem 0.45rem;
        }
        .paciente-badge--tipo {
            background: #f1f5f9;
            color: #334155;
            border-color: #cbd5e1;
        }
        .paciente-detalhe-corpo {
            padding: 0.25rem 0 0;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha,
        .paciente-detalhe-corpo .meus-agendamentos-mensal-linha {
            margin-top: 0;
            padding: 1rem 1.05rem;
            gap: 1rem;
            background: #f8fafc;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__titulo,
        .paciente-detalhe-corpo .meus-agendamentos-mensal-linha > .meus-agendamentos-serie-linha__titulo {
            display: none;
        }
        .paciente-detalhe-corpo .agendamento-valores {
            display: block;
            margin-bottom: 0 !important;
            padding: 0.55rem 0.75rem;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 0.8rem;
            line-height: 1.45;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__dica { display: none; }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__datas {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem 0.65rem;
            padding: 0.15rem 0 0.25rem;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__datas::before {
            content: "Datas do atendimento";
            display: block;
            width: 100%;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #64748b;
            margin-bottom: 0.1rem;
        }
        .paciente-detalhe-corpo .meus-agendamentos-data-badge {
            min-width: 3.35rem;
            padding: 0.35rem 0.7rem;
            font-size: 0.78rem;
            line-height: 1.2;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            align-items: center;
            padding-top: 0.85rem;
            margin-top: 0.15rem;
            border-top: 1px dashed #dbe4ee;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes .btn,
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes form {
            margin: 0 !important;
        }
        .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes .btn {
            padding: 0.4rem 0.75rem;
            font-size: 0.78rem;
            border-radius: 10px;
        }
        .paciente-detalhe-corpo .meus-agendamentos-avulso-linha {
            padding: 0.75rem 0.85rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #fff;
        }
        .paciente-detalhe-corpo .remarcar-mensal-panel__inner {
            margin-top: 0.75rem;
            padding: 0.85rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #fff;
        }
        .meus-agendamentos-serie-linha__datas { display: flex; flex-wrap: wrap; gap: 0.55rem 0.65rem; }
        .meus-agendamentos-data-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 3rem;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid #94a3b8;
            background: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            color: #334155;
        }
        .meus-agendamentos-data-badge--selectable { cursor: pointer; user-select: none; }
        .meus-agendamentos-data-badge--selectable:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .meus-agendamentos-data-badge--selectable.is-selected {
            border-color: #2563eb;
            background: #dbeafe;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.25);
            color: #1d4ed8;
        }
        .meus-agendamentos-data-badge--vencido {
            border-color: #dc2626;
            background: #fee2e2;
            color: #991b1b;
        }
        .meus-agendamentos-data-badge--passado { opacity: 0.72; }
        .meus-agendamentos-data-radio { position: absolute; opacity: 0; pointer-events: none; }
        .meus-agendamentos-serie-linha__acoes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            align-items: center;
        }
        @media (max-width: 575.98px) {
            .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes .btn,
            .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes form {
                flex: 1 1 calc(50% - 0.35rem);
            }
            .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes .btn,
            .paciente-detalhe-corpo .meus-agendamentos-serie-linha__acoes .btn[type="submit"] {
                width: 100%;
            }
        }
        .paciente-caderno-obs {
            margin-bottom: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid #dbe4ee;
            background: #fff;
        }
        .paciente-caderno-obs__titulo {
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 0.35rem;
        }
        .paciente-caderno-obs__dica {
            font-size: 0.72rem;
            color: #94a3b8;
            margin-bottom: 0.55rem;
        }
        .paciente-caderno-obs__extras label {
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.2rem;
        }
        .paciente-caderno-anotacao__tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.35rem;
        }
        .paciente-caderno-anotacao__tag {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 0.15rem 0.45rem;
            border-radius: 999px;
            background: #ecfdf5;
            color: #0f766e;
            border: 1px solid #99f6e4;
        }
        .paciente-caderno-anotacao__tag--lembrete {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #bfdbfe;
        }
        .pacientes-caderno-painel {
            border: 1px solid #dbe4ee;
            border-radius: 14px;
            background: #fff;
            padding: 0.85rem 1rem;
        }
        .pacientes-caderno-painel__titulo {
            font-size: 0.82rem;
            font-weight: 700;
            color: #0f766e;
            margin-bottom: 0.35rem;
        }
        .pacientes-caderno-painel__sub {
            font-size: 0.72rem;
            color: #64748b;
        }
        .pacientes-caderno-painel ul {
            margin: 0;
            padding-left: 1rem;
            font-size: 0.8rem;
            color: #334155;
        }
        .paciente-caderno-obs textarea {
            border-radius: 10px;
            font-size: 0.85rem;
            min-height: 5rem;
            resize: vertical;
        }
        .paciente-caderno-obs__rodape {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: 0.55rem;
        }
        .paciente-caderno-obs__status { font-size: 0.72rem; color: #64748b; }
        .paciente-caderno-obs__status.is-ok { color: #0f766e; }
        .paciente-caderno-obs__status.is-erro { color: #b91c1c; }
        .paciente-caderno-obs__lista-titulo {
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            margin: 1rem 0 0.55rem;
        }
        .paciente-caderno-obs__lista {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            max-height: 16rem;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 0.25rem;
            scrollbar-gutter: stable;
        }
        .paciente-caderno-obs__lista::-webkit-scrollbar {
            width: 6px;
        }
        .paciente-caderno-obs__lista::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }
        .paciente-caderno-obs__lista::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .paciente-caderno-obs__lista-vazia {
            font-size: 0.78rem;
            color: #94a3b8;
            margin: 0;
        }
        .paciente-caderno-anotacao {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.75rem 0.85rem;
            background: #f8fafc;
        }
        .paciente-caderno-anotacao__texto {
            margin: 0 0 0.35rem;
            font-size: 0.85rem;
            color: #334155;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .paciente-caderno-anotacao__meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.35rem;
        }
        .paciente-caderno-anotacao__data {
            font-size: 0.72rem;
            color: #94a3b8;
        }
        .paciente-caderno-anotacao__edicao textarea {
            border-radius: 10px;
            font-size: 0.85rem;
            min-height: 4rem;
            resize: vertical;
        }
        .paciente-caderno-anotacao__acoes-edicao {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.55rem;
        }
        .paciente-caderno-resumo {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .paciente-caderno-resumo__item {
            padding: 0.85rem 1rem;
            border-radius: 14px;
            border: 1px solid #dbe4ee;
            background: #fff;
            text-align: center;
        }
        .paciente-caderno-resumo__valor {
            display: block;
            font-size: 1.35rem;
            font-weight: 700;
            color: #0f766e;
            line-height: 1.2;
        }
        .paciente-caderno-resumo__valor--moeda {
            font-size: 1.15rem;
        }
        .paciente-caderno-resumo__rotulo {
            display: block;
            margin-top: 0.35rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
            line-height: 1.35;
        }
        @media (max-width: 767.98px) {
            .paciente-caderno-resumo {
                grid-template-columns: 1fr;
            }
        }
    </style>
</th:block>

<div th:fragment="corpo(card, anotacoes, salas, horariosDisponiveis)" class="paciente-detalhe-corpo">
    <div class="paciente-caderno-obs" th:attr="data-card-id=${card.cardId}">
        <div class="paciente-caderno-obs__titulo">Nova anotação</div>
        <p class="paciente-caderno-obs__dica mb-0">
            Notas privadas: só você vê. Somem ao encerrar a série ou cancelar o atendimento.
        </p>
        <label class="visually-hidden" th:for="${'obs-nova-' + card.cardId}">Nova observação</label>
        <textarea class="form-control paciente-caderno-obs__nova mt-2"
                  th:id="${'obs-nova-' + card.cardId}"
                  rows="3"
                  maxlength="2000"
                  placeholder="Ex.: preferências, combinar com responsável, lembretes da sessão..."></textarea>
        <div class="row g-2 mt-2 paciente-caderno-obs__extras">
            <div class="col-md-5">
                <label th:for="${'obs-evolucao-' + card.cardId}">Evolução clínica</label>
                <select class="form-select form-select-sm paciente-caderno-obs__evolucao-nova"
                        th:id="${'obs-evolucao-' + card.cardId}">
                    <option value="">Sem registro</option>
                    <option value="MELHORIA">Melhoria</option>
                    <option value="ESTAVEL">Estável</option>
                    <option value="REGRESSAO">Regressão</option>
                </select>
            </div>
            <div class="col-md-7">
                <label th:for="${'obs-lembrete-' + card.cardId}">Lembrete pessoal</label>
                <input type="date"
                       class="form-control form-control-sm paciente-caderno-obs__lembrete-nova"
                       th:id="${'obs-lembrete-' + card.cardId}">
            </div>
        </div>
        <div class="paciente-caderno-obs__rodape">
            <span class="paciente-caderno-obs__status" aria-live="polite"></span>
            <button type="button" class="btn btn-sm btn-outline-primary paciente-caderno-obs__salvar-nova">
                Salvar anotação
            </button>
        </div>

        <div class="paciente-caderno-obs__lista-titulo">Anotações salvas</div>
        <p class="paciente-caderno-obs__lista-vazia"
           th:classappend="${anotacoes != null and !anotacoes.isEmpty()} ? ' d-none' : ''">
            Nenhuma anotação salva ainda.
        </p>
        <div class="paciente-caderno-obs__lista" id="listaAnotacoesSalvas">
            <div class="paciente-caderno-anotacao"
                 th:each="anotacao : ${anotacoes}"
                 th:attr="data-id=${anotacao.id}">
                <div class="paciente-caderno-anotacao__visual">
                    <div class="paciente-caderno-anotacao__tags"
                         th:if="${(anotacao.evolucaoRotulo != null and !anotacao.evolucaoRotulo.isEmpty()) or (anotacao.lembreteRotulo != null and !anotacao.lembreteRotulo.isEmpty())}">
                        <span class="paciente-caderno-anotacao__tag"
                              th:if="${anotacao.evolucaoRotulo != null and !anotacao.evolucaoRotulo.isEmpty()}"
                              th:text="${'Evolução: ' + anotacao.evolucaoRotulo}">Evolução</span>
                        <span class="paciente-caderno-anotacao__tag paciente-caderno-anotacao__tag--lembrete"
                              th:if="${anotacao.lembreteRotulo != null and !anotacao.lembreteRotulo.isEmpty()}"
                              th:text="${'Lembrete: ' + anotacao.lembreteRotulo}">Lembrete</span>
                    </div>
                    <p class="paciente-caderno-anotacao__texto" th:text="${anotacao.texto}">Texto</p>
                    <div class="paciente-caderno-anotacao__meta">
                        <span class="paciente-caderno-anotacao__data" th:text="${anotacao.dataRotulo}">—</span>
                        <button type="button" class="btn btn-sm btn-link p-0 paciente-caderno-anotacao__editar">
                            Editar
                        </button>
                    </div>
                </div>
                <div class="paciente-caderno-anotacao__edicao d-none">
                    <textarea class="form-control paciente-caderno-anotacao__texto-edit"
                              rows="3"
                              maxlength="2000"
                              th:text="${anotacao.texto}"></textarea>
                    <div class="row g-2 mt-2">
                        <div class="col-md-5">
                            <label class="form-label small mb-1">Evolução clínica</label>
                            <select class="form-select form-select-sm paciente-caderno-anotacao__evolucao-edit">
                                <option value="">Sem registro</option>
                                <option value="MELHORIA" th:selected="${anotacao.evolucaoRotulo == 'Melhoria'}">Melhoria</option>
                                <option value="ESTAVEL" th:selected="${anotacao.evolucaoRotulo == 'Estável'}">Estável</option>
                                <option value="REGRESSAO" th:selected="${anotacao.evolucaoRotulo == 'Regressão'}">Regressão</option>
                            </select>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label small mb-1">Lembrete pessoal</label>
                            <input type="date"
                                   class="form-control form-control-sm paciente-caderno-anotacao__lembrete-edit"
                                   th:value="${anotacao.lembreteDataInput}">
                        </div>
                    </div>
                    <div class="paciente-caderno-anotacao__acoes-edicao">
                        <button type="button" class="btn btn-sm btn-primary paciente-caderno-anotacao__salvar-edicao">
                            Salvar
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary paciente-caderno-anotacao__cancelar-edicao">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${card.tipo.name() == 'AVULSO'}">
        <div th:replace="~{fragments/caderno-agendamentos :: avulso-lista(agendamentos=${card.avulsos}, vazioRotulo=null)}"></div>
    </div>
    <div th:if="${card.tipo.name() == 'FIXO' or card.tipo.name() == 'QUINZENAL'}">
        <div th:replace="~{fragments/caderno-agendamentos :: series-lista(series=${card.serieComoLista}, radioPrefix=${card.radioPrefix})}"></div>
    </div>
    <div th:if="${card.tipo.name() == 'MENSAL'}">
        <div th:replace="~{fragments/caderno-agendamentos :: mensal-lista(linhasMensais=${card.mensalComoLista}, salas=${salas}, horariosDisponiveis=${horariosDisponiveis})}"></div>
    </div>
</div>

<th:block th:fragment="modais">
    <div class="modal fade admin-modal" id="encerrarSerieModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header px-4 py-3">
                    <div>
                        <h2 class="modal-title h5 mb-1" id="encerrarSerieTitulo">Encerrar série</h2>
                        <p class="text-muted small mb-0" id="encerrarSerieResumo">Todos os horários da série serão removidos.</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="encerrarSerieForm" method="post">
                    <div class="modal-body px-4">
                        <input type="hidden" name="_csrf" id="encerrarSerieCsrf">
                        <label class="form-label" for="encerrarSerieMotivo">Motivo do encerramento</label>
                        <textarea id="encerrarSerieMotivo"
                                  name="motivoEncerramento"
                                  class="form-control"
                                  rows="3"
                                  maxlength="500"
                                  minlength="3"
                                  required
                                  placeholder="Ex.: cliente encerrou tratamento..."></textarea>
                    </div>
                    <div class="modal-footer px-4 pb-4 pt-0 border-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Voltar</button>
                        <button type="submit" class="btn btn-primary">Confirmar encerramento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade admin-modal" id="alterarValorProfissionalSerieModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header px-4 py-3">
                    <div>
                        <h2 class="modal-title h5 mb-1">Alterar valor da consulta</h2>
                        <p class="text-muted small mb-0" id="alterarValorProfissionalSerieResumo">Série</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="alterarValorProfissionalSerieForm" method="post">
                    <div class="modal-body px-4">
                        <input type="hidden" name="_csrf" id="alterarValorProfissionalSerieCsrf">
                        <label class="form-label" for="alterarValorProfissionalSerieValor">Novo valor Prof. (R$)</label>
                        <input type="text"
                               class="form-control"
                               id="alterarValorProfissionalSerieValor"
                               name="valorProfissionalRecebe"
                               inputmode="numeric"
                               autocomplete="off"
                               required
                               placeholder="0,00">
                    </div>
                    <div class="modal-footer px-4 pb-4 pt-0 border-0">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Voltar</button>
                        <button type="submit" class="btn btn-primary">Confirmar alteração</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<script th:fragment="scripts(cardId, anotacoesIniciais, nomePaciente)" th:inline="javascript">
    (function () {
        var basePath = /*[[@{/}]]*/ '/';
        var cardIdAtual = /*[[${cardId}]]*/ '';
        var nomePacienteAtual = /*[[${nomePaciente}]]*/ '';
        var anotacoesIniciais = /*[[${anotacoesIniciais}]]*/ [];

        var encerrarSerieModalEl = document.getElementById('encerrarSerieModal');
        var encerrarSerieForm = document.getElementById('encerrarSerieForm');
        var encerrarSerieResumo = document.getElementById('encerrarSerieResumo');
        var encerrarSerieTitulo = document.getElementById('encerrarSerieTitulo');
        var encerrarSerieCsrf = document.getElementById('encerrarSerieCsrf');

        function copiarCsrf(destino) {
            var csrf = document.querySelector('input[name="_csrf"]');
            if (csrf && destino) {
                destino.name = csrf.name;
                destino.value = csrf.value;
            }
        }

        function abrirModalEncerrarSerie(agendamentoId, resumo, tipoSerie) {
            if (!encerrarSerieModalEl || !encerrarSerieForm || !agendamentoId) return;
            copiarCsrf(encerrarSerieCsrf);
            encerrarSerieForm.action = basePath + 'agendamentos/' + agendamentoId + '/encerrar-fixo';
            if (encerrarSerieResumo) encerrarSerieResumo.textContent = resumo || 'Todos os horários da série serão removidos.';
            if (encerrarSerieTitulo) {
                if (tipoSerie === 'QUINZENAL') encerrarSerieTitulo.textContent = 'Encerrar série quinzenal';
                else if (tipoSerie === 'MENSAL') encerrarSerieTitulo.textContent = 'Encerrar série mensal';
                else encerrarSerieTitulo.textContent = 'Encerrar série semanal';
            }
            bootstrap.Modal.getOrCreateInstance(encerrarSerieModalEl).show();
        }

        var alterarValorProfModalEl = document.getElementById('alterarValorProfissionalSerieModal');
        var alterarValorProfForm = document.getElementById('alterarValorProfissionalSerieForm');
        var alterarValorProfInput = document.getElementById('alterarValorProfissionalSerieValor');
        var alterarValorProfResumo = document.getElementById('alterarValorProfissionalSerieResumo');
        var alterarValorProfCsrf = document.getElementById('alterarValorProfissionalSerieCsrf');

        function abrirModalAlterarValorProfissional(agendamentoId, rotuloSerie, valorAtual) {
            if (!alterarValorProfModalEl || !alterarValorProfForm || !agendamentoId) return;
            copiarCsrf(alterarValorProfCsrf);
            alterarValorProfForm.action = basePath + 'agendamentos/' + agendamentoId + '/alterar-valor-profissional-serie';
            if (alterarValorProfResumo) alterarValorProfResumo.textContent = rotuloSerie || 'Série';
            if (alterarValorProfInput) alterarValorProfInput.value = valorAtual || '';
            bootstrap.Modal.getOrCreateInstance(alterarValorProfModalEl).show();
        }

        document.querySelectorAll('.meus-agendamentos-alterar-valor-prof-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                abrirModalAlterarValorProfissional(
                    btn.getAttribute('data-agendamento-referencia-id'),
                    btn.getAttribute('data-serie-rotulo'),
                    btn.getAttribute('data-valor-atual')
                );
            });
        });

        document.querySelectorAll('.meus-agendamentos-serie-linha').forEach(function (card) {
            var cancelForm = card.querySelector('.meus-agendamentos-cancelar-data-form');
            var cancelBtn = cancelForm ? cancelForm.querySelector('.meus-agendamentos-cancelar-data-btn') : null;
            var payBtn = card.querySelector('.meus-agendamentos-pagar-data-btn');
            var relocBtn = card.querySelector('.meus-agendamentos-realocar-data-btn');
            var encerrarBtn = card.querySelector('.meus-agendamentos-encerrar-serie-btn');
            var tipoSerie = encerrarBtn ? encerrarBtn.getAttribute('data-tipo-serie') : null;
            var radios = card.querySelectorAll('.meus-agendamentos-data-radio');
            if (radios.length === 0) return;

            function desabilitar(btn) {
                if (!btn) return;
                btn.href = '#';
                btn.classList.add('disabled');
                btn.setAttribute('aria-disabled', 'true');
            }

            function motivoCancelarBloqueado(selecionado) {
                if (!selecionado) return 'Selecione uma data acima antes de cancelar.';
                if (selecionado.getAttribute('data-pode-cancelar') === 'true') return '';
                if (selecionado.getAttribute('data-pago') === 'true') {
                    return 'Pagamento já confirmado nesta data. Fale com a recepção para cancelar.';
                }
                var badge = selecionado.closest('.meus-agendamentos-data-badge');
                if (badge && badge.classList.contains('meus-agendamentos-data-badge--passado')) {
                    return 'Esta data já passou. Fale com a recepção.';
                }
                return 'Cancelamento só com mais de 24 horas de antecedência e sem pagamento confirmado.';
            }

            function motivoRealocarBloqueado(selecionado) {
                if (!selecionado) return 'Selecione uma data acima antes de realocar.';
                if (selecionado.getAttribute('data-pode-realocar') === 'true') return '';
                return 'Realocação indisponível nesta data. Fale com a recepção.';
            }

            function atualizarSelecao() {
                var selecionado = card.querySelector('.meus-agendamentos-data-radio:checked');
                card.querySelectorAll('.meus-agendamentos-data-badge--selectable').forEach(function (badge) {
                    badge.classList.toggle('is-selected', !!(selecionado && badge.contains(selecionado)));
                });
                if (selecionado && selecionado.value) {
                    if (cancelForm && cancelBtn) {
                        var podeCancelar = selecionado.getAttribute('data-pode-cancelar') === 'true';
                        if (podeCancelar) {
                            cancelForm.action = basePath + 'agendamentos/' + selecionado.value + '/cancelar';
                            cancelBtn.disabled = false;
                            cancelBtn.removeAttribute('title');
                        } else {
                            cancelForm.removeAttribute('action');
                            cancelBtn.disabled = true;
                            cancelBtn.title = motivoCancelarBloqueado(selecionado);
                        }
                    }
                    if (payBtn) {
                        var podePagar = selecionado.getAttribute('data-pode-pagar') === 'true';
                        var aguardandoQr = selecionado.getAttribute('data-aguardando-qr') === 'true';
                        var pago = selecionado.getAttribute('data-pago') === 'true';
                        if (pago) {
                            desabilitar(payBtn);
                        } else if (aguardandoQr) {
                            payBtn.href = basePath + 'pagamentos/' + selecionado.value;
                            payBtn.textContent = 'Abrir pagamento PIX';
                            payBtn.classList.remove('disabled');
                            payBtn.removeAttribute('aria-disabled');
                        } else if (podePagar) {
                            payBtn.href = basePath + 'pagamentos/' + selecionado.value + '/pagar-agora';
                            payBtn.textContent = 'Pagar data';
                            payBtn.classList.remove('disabled');
                            payBtn.removeAttribute('aria-disabled');
                        } else {
                            desabilitar(payBtn);
                        }
                    }
                    if (relocBtn) {
                        var podeRealocar = selecionado.getAttribute('data-pode-realocar') === 'true';
                        if (podeRealocar) {
                            relocBtn.href = basePath + 'agendamentos/' + selecionado.value + '/realocar';
                            relocBtn.classList.remove('disabled');
                            relocBtn.removeAttribute('aria-disabled');
                            relocBtn.removeAttribute('title');
                        } else {
                            desabilitar(relocBtn);
                            relocBtn.title = motivoRealocarBloqueado(selecionado);
                        }
                    }
                } else {
                    if (cancelForm) cancelForm.removeAttribute('action');
                    if (cancelBtn) {
                        cancelBtn.disabled = true;
                        cancelBtn.title = motivoCancelarBloqueado(null);
                    }
                    desabilitar(payBtn);
                    desabilitar(relocBtn);
                    if (relocBtn) relocBtn.title = motivoRealocarBloqueado(null);
                }
            }

            radios.forEach(function (radio) {
                radio.addEventListener('change', atualizarSelecao);
                var badge = radio.closest('.meus-agendamentos-data-badge--selectable');
                if (badge) {
                    badge.addEventListener('click', function () {
                        window.setTimeout(atualizarSelecao, 0);
                    });
                }
            });

            var radioInicial = null;
            radios.forEach(function (radio) {
                var badgeData = radio.closest('.meus-agendamentos-data-badge');
                if (!radioInicial && badgeData && !badgeData.classList.contains('meus-agendamentos-data-badge--passado')) {
                    radioInicial = radio;
                }
            });
            if (!radioInicial && radios.length > 0) radioInicial = radios[0];
            if (radioInicial) radioInicial.checked = true;
            atualizarSelecao();

            if (relocBtn) {
                relocBtn.addEventListener('click', function (evento) {
                    if (relocBtn.classList.contains('disabled')) {
                        evento.preventDefault();
                        var selecionado = card.querySelector('.meus-agendamentos-data-radio:checked');
                        var motivo = motivoRealocarBloqueado(selecionado);
                        if (motivo) window.alert(motivo);
                    }
                });
            }

            if (payBtn) {
                payBtn.addEventListener('click', function (evento) {
                    if (payBtn.classList.contains('disabled')) {
                        evento.preventDefault();
                        return;
                    }
                    var href = payBtn.getAttribute('href') || '';
                    if (href.indexOf('/pagar-agora') !== -1) {
                        evento.preventDefault();
                        var csrf = document.querySelector('input[name="_csrf"]');
                        var form = document.createElement('form');
                        form.method = 'post';
                        form.action = href.replace('/pagar-agora', '/gerar-link');
                        if (csrf) {
                            var token = document.createElement('input');
                            token.type = 'hidden';
                            token.name = csrf.name;
                            token.value = csrf.value;
                            form.appendChild(token);
                        }
                        document.body.appendChild(form);
                        form.submit();
                    }
                });
            }

            if (cancelForm) {
                cancelForm.addEventListener('submit', function (evento) {
                    var selecionado = card.querySelector('.meus-agendamentos-data-radio:checked');
                    if (!selecionado || !cancelForm.action) {
                        evento.preventDefault();
                        window.alert(motivoCancelarBloqueado(selecionado));
                        return;
                    }
                    var rotulo = selecionado.getAttribute('data-data-rotulo') || selecionado.value;
                    if (!window.confirm('Cancelar somente o atendimento do dia ' + rotulo + '?')) {
                        evento.preventDefault();
                    }
                });
            }

            if (encerrarBtn) {
                encerrarBtn.addEventListener('click', function () {
                    var referenciaId = encerrarBtn.getAttribute('data-agendamento-referencia-id');
                    if (!referenciaId) return;
                    abrirModalEncerrarSerie(
                        referenciaId,
                        (nomePacienteAtual || 'Série') + ' — série completa',
                        tipoSerie
                    );
                });
            }
        });

        document.querySelectorAll('.btn-abrir-remarcar-mensal').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var panelId = btn.getAttribute('data-panel-id');
                var panel = panelId ? document.getElementById(panelId) : null;
                if (panel) {
                    panel.classList.remove('d-none');
                    panel.classList.add('remarcar-mensal-panel--aberto');
                }
            });
        });
        document.querySelectorAll('.btn-fechar-remarcar-mensal').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var panel = btn.closest('.remarcar-mensal-panel');
                if (panel) {
                    panel.classList.add('d-none');
                    panel.classList.remove('remarcar-mensal-panel--aberto');
                }
            });
        });

        function obterCsrfToken() {
            var csrf = document.querySelector('input[name="_csrf"]');
            if (!csrf) return null;
            return { nome: csrf.name, valor: csrf.value };
        }

        var blocoObs = document.querySelector('.paciente-caderno-obs');
        if (blocoObs && cardIdAtual) {
            var textareaNova = blocoObs.querySelector('.paciente-caderno-obs__nova');
            var evolucaoNova = blocoObs.querySelector('.paciente-caderno-obs__evolucao-nova');
            var lembreteNova = blocoObs.querySelector('.paciente-caderno-obs__lembrete-nova');
            var status = blocoObs.querySelector('.paciente-caderno-obs__status');
            var btnSalvarNova = blocoObs.querySelector('.paciente-caderno-obs__salvar-nova');
            var listaAnotacoes = document.getElementById('listaAnotacoesSalvas');
            var vazioAnotacoes = blocoObs.querySelector('.paciente-caderno-obs__lista-vazia');

            function definirStatus(mensagem, tipo) {
                if (!status) return;
                status.textContent = mensagem || '';
                status.classList.remove('is-ok', 'is-erro');
                if (tipo === 'ok') status.classList.add('is-ok');
                else if (tipo === 'erro') status.classList.add('is-erro');
            }

            function atualizarVazioLista() {
                if (!vazioAnotacoes || !listaAnotacoes) return;
                var temItens = listaAnotacoes.querySelectorAll('.paciente-caderno-anotacao').length > 0;
                vazioAnotacoes.classList.toggle('d-none', temItens);
            }

            function montarTagsHtml(anotacao) {
                var html = '';
                if (anotacao.evolucaoRotulo) {
                    html += '<span class="paciente-caderno-anotacao__tag">Evolução: ' + anotacao.evolucaoRotulo + '</span>';
                }
                if (anotacao.lembreteRotulo) {
                    html += '<span class="paciente-caderno-anotacao__tag paciente-caderno-anotacao__tag--lembrete">Lembrete: '
                        + anotacao.lembreteRotulo + '</span>';
                }
                if (!html) return '';
                return '<div class="paciente-caderno-anotacao__tags">' + html + '</div>';
            }

            function montarItemAnotacao(anotacao) {
                var item = document.createElement('div');
                item.className = 'paciente-caderno-anotacao';
                item.setAttribute('data-id', anotacao.id);
                item.innerHTML =
                    '<div class="paciente-caderno-anotacao__visual">' +
                        montarTagsHtml(anotacao) +
                        '<p class="paciente-caderno-anotacao__texto"></p>' +
                        '<div class="paciente-caderno-anotacao__meta">' +
                            '<span class="paciente-caderno-anotacao__data"></span>' +
                            '<button type="button" class="btn btn-sm btn-link p-0 paciente-caderno-anotacao__editar">Editar</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="paciente-caderno-anotacao__edicao d-none">' +
                        '<textarea class="form-control paciente-caderno-anotacao__texto-edit" rows="3" maxlength="2000"></textarea>' +
                        '<div class="row g-2 mt-2">' +
                            '<div class="col-md-5">' +
                                '<label class="form-label small mb-1">Evolução clínica</label>' +
                                '<select class="form-select form-select-sm paciente-caderno-anotacao__evolucao-edit">' +
                                    '<option value="">Sem registro</option>' +
                                    '<option value="MELHORIA">Melhoria</option>' +
                                    '<option value="ESTAVEL">Estável</option>' +
                                    '<option value="REGRESSAO">Regressão</option>' +
                                '</select>' +
                            '</div>' +
                            '<div class="col-md-7">' +
                                '<label class="form-label small mb-1">Lembrete pessoal</label>' +
                                '<input type="date" class="form-control form-control-sm paciente-caderno-anotacao__lembrete-edit">' +
                            '</div>' +
                        '</div>' +
                        '<div class="paciente-caderno-anotacao__acoes-edicao">' +
                            '<button type="button" class="btn btn-sm btn-primary paciente-caderno-anotacao__salvar-edicao">Salvar</button>' +
                            '<button type="button" class="btn btn-sm btn-outline-secondary paciente-caderno-anotacao__cancelar-edicao">Cancelar</button>' +
                        '</div>' +
                    '</div>';
                atualizarVisualItem(item, anotacao);
                configurarItemAnotacao(item);
                return item;
            }

            function atualizarVisualItem(item, anotacao) {
                var visual = item.querySelector('.paciente-caderno-anotacao__visual');
                var tagsAtuais = visual.querySelector('.paciente-caderno-anotacao__tags');
                if (tagsAtuais) tagsAtuais.remove();
                var tagsHtml = montarTagsHtml(anotacao);
                if (tagsHtml) {
                    visual.insertAdjacentHTML('afterbegin', tagsHtml);
                }
                item.querySelector('.paciente-caderno-anotacao__texto').textContent = anotacao.texto || '';
                item.querySelector('.paciente-caderno-anotacao__data').textContent = anotacao.dataRotulo || '';
                item.querySelector('.paciente-caderno-anotacao__texto-edit').value = anotacao.texto || '';
                var evolucaoEdit = item.querySelector('.paciente-caderno-anotacao__evolucao-edit');
                if (evolucaoEdit) {
                    var mapa = { 'Melhoria': 'MELHORIA', 'Estável': 'ESTAVEL', 'Regressão': 'REGRESSAO' };
                    evolucaoEdit.value = mapa[anotacao.evolucaoRotulo] || '';
                }
                var lembreteEdit = item.querySelector('.paciente-caderno-anotacao__lembrete-edit');
                if (lembreteEdit) lembreteEdit.value = anotacao.lembreteDataInput || '';
            }

            function postFormulario(url, dados) {
                var csrf = obterCsrfToken();
                var params = new URLSearchParams();
                params.set('texto', dados.texto || '');
                if (dados.evolucao) params.set('evolucao', dados.evolucao);
                if (dados.lembreteEm) params.set('lembreteEm', dados.lembreteEm);
                if (csrf) params.set(csrf.nome, csrf.valor);
                return fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
                    body: params.toString()
                }).then(function (resposta) {
                    return resposta.json().then(function (corpo) {
                        return { ok: resposta.ok, corpo: corpo };
                    });
                });
            }

            function configurarItemAnotacao(item) {
                var visual = item.querySelector('.paciente-caderno-anotacao__visual');
                var edicao = item.querySelector('.paciente-caderno-anotacao__edicao');
                var btnEditar = item.querySelector('.paciente-caderno-anotacao__editar');
                var btnSalvarEdicao = item.querySelector('.paciente-caderno-anotacao__salvar-edicao');
                var btnCancelarEdicao = item.querySelector('.paciente-caderno-anotacao__cancelar-edicao');
                var textareaEdicao = item.querySelector('.paciente-caderno-anotacao__texto-edit');

                if (btnEditar) {
                    btnEditar.addEventListener('click', function () {
                        visual.classList.add('d-none');
                        edicao.classList.remove('d-none');
                        textareaEdicao.focus();
                    });
                }

                if (btnCancelarEdicao) {
                    btnCancelarEdicao.addEventListener('click', function () {
                        textareaEdicao.value = item.querySelector('.paciente-caderno-anotacao__texto').textContent || '';
                        edicao.classList.add('d-none');
                        visual.classList.remove('d-none');
                    });
                }

                if (btnSalvarEdicao) {
                    btnSalvarEdicao.addEventListener('click', function () {
                        var anotacaoId = item.getAttribute('data-id');
                        var texto = (textareaEdicao.value || '').trim();
                        if (!texto) {
                            window.alert('Escreva algo antes de salvar.');
                            return;
                        }
                        var evolucao = item.querySelector('.paciente-caderno-anotacao__evolucao-edit');
                        var lembrete = item.querySelector('.paciente-caderno-anotacao__lembrete-edit');
                        btnSalvarEdicao.disabled = true;
                        postFormulario(
                            basePath + 'agendamentos/meus-pacientes/' + encodeURIComponent(cardIdAtual)
                                + '/anotacoes/' + encodeURIComponent(anotacaoId),
                            {
                                texto: texto,
                                evolucao: evolucao ? evolucao.value : '',
                                lembreteEm: lembrete ? lembrete.value : ''
                            }
                        )
                            .then(function (resultado) {
                                if (resultado.ok && resultado.corpo && resultado.corpo.anotacao) {
                                    atualizarVisualItem(item, resultado.corpo.anotacao);
                                    edicao.classList.add('d-none');
                                    visual.classList.remove('d-none');
                                    definirStatus('Anotação atualizada.', 'ok');
                                } else {
                                    definirStatus((resultado.corpo && resultado.corpo.erro) || 'Não foi possível salvar.', 'erro');
                                }
                            })
                            .catch(function () {
                                definirStatus('Erro de conexão. Tente de novo.', 'erro');
                            })
                            .finally(function () {
                                btnSalvarEdicao.disabled = false;
                            });
                    });
                }
            }

            document.querySelectorAll('.paciente-caderno-anotacao').forEach(configurarItemAnotacao);
            atualizarVazioLista();

            if (btnSalvarNova) {
                btnSalvarNova.addEventListener('click', function () {
                    var texto = (textareaNova.value || '').trim();
                    if (!texto) {
                        definirStatus('Escreva algo antes de salvar.', 'erro');
                        return;
                    }
                    definirStatus('Salvando...', null);
                    btnSalvarNova.disabled = true;
                    postFormulario(
                        basePath + 'agendamentos/meus-pacientes/' + encodeURIComponent(cardIdAtual) + '/anotacoes',
                        {
                            texto: texto,
                            evolucao: evolucaoNova ? evolucaoNova.value : '',
                            lembreteEm: lembreteNova ? lembreteNova.value : ''
                        }
                    )
                        .then(function (resultado) {
                            if (resultado.ok && resultado.corpo && resultado.corpo.anotacao) {
                                if (listaAnotacoes) {
                                    listaAnotacoes.appendChild(montarItemAnotacao(resultado.corpo.anotacao));
                                }
                                textareaNova.value = '';
                                if (evolucaoNova) evolucaoNova.value = '';
                                if (lembreteNova) lembreteNova.value = '';
                                atualizarVazioLista();
                                definirStatus('Anotação salva.', 'ok');
                            } else {
                                definirStatus((resultado.corpo && resultado.corpo.erro) || 'Não foi possível salvar.', 'erro');
                            }
                        })
                        .catch(function () {
                            definirStatus('Erro de conexão. Tente de novo.', 'erro');
                        })
                        .finally(function () {
                            btnSalvarNova.disabled = false;
                        });
                });
            }
        }
    })();
</script>

</body>
</html>
