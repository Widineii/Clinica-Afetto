<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal"
     th:if="${exibirModalEmailNotificacao}"
     class="modal fade admin-modal"
     id="emailNotificacaoModal"
     tabindex="-1"
     aria-labelledby="emailNotificacaoModalTitulo"
     aria-hidden="true"
     data-bs-backdrop="static"
     data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header px-4 py-3">
                <div>
                    <h2 class="modal-title h5 mb-1" id="emailNotificacaoModalTitulo">Cadastre seu e-mail pessoal</h2>
                    <p class="text-muted small mb-0">
                        Usamos esse e-mail para avisos de pagamento pendente nos horários da sua forma de cobrança (diário, semanal ou mensal).
                    </p>
                </div>
            </div>
            <div class="modal-body px-4 pb-4">
                <div th:if="${erroEmail != null}" class="alert alert-danger mb-3" th:text="${erroEmail}"></div>
                <form th:action="@{/conta/email-profissional}"
                      th:object="${atualizarEmailProfissionalForm}"
                      method="post"
                      class="row g-3"
                      id="formEmailProfissional">
                    <th:block th:replace="~{fragments/csrf :: token}"></th:block>
                    <div class="col-12">
                        <label class="form-label" for="emailProfissionalNotificacao">E-mail pessoal</label>
                        <input th:field="*{email}"
                               type="email"
                               class="form-control"
                               id="emailProfissionalNotificacao"
                               maxlength="120"
                               autocomplete="email"
                               placeholder="seu.email@gmail.com"
                               required>
                        <div class="form-text">Informe um e-mail que você consulta com frequência. Fica salvo na sua conta.</div>
                    </div>
                    <div class="col-12 d-grid pt-1">
                        <button type="submit" class="btn btn-teal">Salvar e-mail</button>
                    </div>
                </form>
                <form th:action="@{/conta/email-profissional/pular}" method="post" class="d-grid mt-2">
                    <th:block th:replace="~{fragments/csrf :: token}"></th:block>
                    <button type="submit" class="btn btn-outline-secondary">Continuar sem cadastrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script th:if="${exibirModalEmailNotificacao}">
    (function () {
        var input = document.getElementById('emailProfissionalNotificacao');
        if (input && !input.value) {
            window.setTimeout(function () { input.focus(); }, 300);
        }
    })();
</script>
</body>
</html>
