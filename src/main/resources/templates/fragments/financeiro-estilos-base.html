<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <th:block th:replace="~{fragments/estilos-notificacao-relatorio :: css}"></th:block>
        <style>
            :root {
                --fin-bg: var(--afetto-teal-soft);
                --fin-text: #0f172a;
                --fin-muted: var(--afetto-grey);
                --fin-border: var(--afetto-teal-muted);
            }

            body.financeiro-page {
                min-height: 100vh;
                margin: 0;
                font-family: 'Lato', sans-serif;
                color: var(--fin-text);
                background: linear-gradient(165deg, var(--afetto-teal-soft) 0%, #f8fafc 45%, #eef8f7 100%);
                padding: 24px 16px 48px;
            }

            .financeiro-wrap {
                max-width: 1100px;
                margin: 0 auto;
            }

            .financeiro-card {
                background: #fff;
                border: 1px solid var(--fin-border);
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            }

            .financeiro-card .card-body {
                padding: 1.5rem;
            }

            .financeiro-resumo-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 1rem;
            }

            .financeiro-resumo-card {
                background: #fff;
                border: 1px solid var(--fin-border);
                border-radius: 18px;
                padding: 1.25rem 1.35rem;
                box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
            }

            .financeiro-resumo-card--destaque {
                background: linear-gradient(135deg, var(--afetto-teal-soft), var(--afetto-teal-soft-2));
                border-color: var(--afetto-teal-muted-strong);
            }

            .financeiro-resumo-label {
                font-size: 0.85rem;
                color: var(--fin-muted);
                margin-bottom: 0.35rem;
            }

            .financeiro-resumo-valor {
                font-family: 'Poppins', sans-serif;
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--fin-teal-dark);
            }

            .financeiro-resumo-card--destaque .financeiro-resumo-valor {
                color: var(--fin-teal);
            }

            .financeiro-grid-principal {
                display: grid;
                grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.2fr);
                gap: 1.25rem;
                align-items: start;
            }

            .financeiro-badge-tipo {
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                border-radius: 999px;
                padding: 0.25rem 0.65rem;
            }

            .financeiro-badge-tipo--mensal {
                background: #dbeafe;
                color: #1d4ed8;
            }

            .financeiro-badge-tipo--unica {
                background: #fef3c7;
                color: #b45309;
            }

            .financeiro-table {
                margin-bottom: 0;
            }

            .financeiro-table th {
                font-size: 0.82rem;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--fin-muted);
                font-weight: 700;
                border-bottom-width: 1px;
            }

            .financeiro-table td {
                vertical-align: middle;
            }

            .financeiro-hint {
                font-size: 0.88rem;
                color: var(--fin-muted);
            }

            .financeiro-filtro-resumo {
                font-size: 0.95rem;
                color: var(--fin-text);
            }

            .taxas-caderno-serie-linha,
            .taxas-caderno-avulso-linha {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 12px 14px;
                margin-top: 8px;
                border-radius: 10px;
                background: #f8fafc;
                border: 1px solid #e2e8f0;
                color: #0f172a;
            }

            .taxas-caderno-serie-linha__titulo,
            .taxas-caderno-avulso-linha__texto {
                font-weight: 600;
                font-size: 0.9rem;
            }

            .taxas-caderno-serie-linha__datas {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .taxas-caderno-data-badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 3rem;
                padding: 4px 10px;
                border-radius: 999px;
                border: 1px solid #94a3b8;
                background: #ffffff;
                font-size: 0.78rem;
                font-weight: 600;
                color: #334155;
            }

            .financeiro-empty {
                color: var(--fin-muted);
                font-size: 0.95rem;
                padding: 0.75rem 0;
            }

            .financeiro-bloqueios {
                background: linear-gradient(135deg, #fef2f2 0%, #fff7ed 100%);
                border: 1px solid #fecaca;
                border-radius: 16px;
                padding: 1rem 1.15rem;
                box-shadow: 0 6px 18px rgba(220, 38, 38, 0.08);
            }

            .financeiro-bloqueios__head {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 12px;
            }

            .financeiro-bloqueios__icon {
                flex-shrink: 0;
                width: 36px;
                height: 36px;
                border-radius: 10px;
                background: #dc2626;
                color: #fff;
                font-weight: 800;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.1rem;
            }

            .financeiro-bloqueios__title {
                font-family: 'Poppins', sans-serif;
                font-weight: 700;
                color: #991b1b;
            }

            .financeiro-bloqueios__subtitle {
                font-size: 0.88rem;
                color: #b45309;
            }

            .financeiro-bloqueios__lista {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .financeiro-bloqueios__item {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 8px 12px;
                padding: 10px 12px;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.85);
                border: 1px solid #fecaca;
            }

            .financeiro-bloqueios__msg {
                font-weight: 600;
                color: #7f1d1d;
                flex: 1 1 220px;
            }

            .financeiro-bloqueios__meta {
                font-size: 0.78rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.03em;
                color: #b45309;
                background: #fef3c7;
                padding: 3px 8px;
                border-radius: 999px;
            }

            .financeiro-bloqueios__link {
                font-size: 0.85rem;
                font-weight: 600;
                color: var(--fin-teal);
                text-decoration: none;
            }

            .financeiro-bloqueios__link:hover {
                text-decoration: underline;
            }

            .financeiro-bloqueio-destaque {
                padding: 12px 14px;
                border-radius: 12px;
                background: #fef2f2;
                border: 1px solid #f87171;
                color: #991b1b;
            }

            .fin-dashboard-topo {
                display: grid;
                grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
                gap: 0.75rem;
                margin-bottom: 0.75rem;
            }

            .fin-kpi-col {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .fin-kpi-card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 4px;
                padding: 1.25rem 1.5rem;
                box-shadow: none;
                min-height: 140px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .fin-kpi-card__label {
                font-size: 0.88rem;
                font-weight: 600;
                color: #252423;
                margin-bottom: 0.35rem;
            }

            .fin-kpi-card__valor {
                font-family: 'Segoe UI', 'Poppins', sans-serif;
                font-size: clamp(1.85rem, 4vw, 2.5rem);
                font-weight: 700;
                color: #107c10;
                line-height: 1.05;
            }

            .fin-kpi-card__meta {
                margin-top: 0.65rem;
                font-size: 0.85rem;
                color: #605e5c;
            }

            .fin-kpi-card--pendente .fin-kpi-card__valor {
                color: #b45309;
            }

            .fin-kpi-card--pendente {
                min-height: 120px;
            }

            .fin-cronograma-card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 4px;
                padding: 1rem 1.15rem 1.1rem;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .fin-cronograma-card__titulo {
                font-size: 0.88rem;
                font-weight: 700;
                color: #252423;
                margin: 0 0 0.2rem;
            }

            .fin-cronograma-card__topo {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 0.75rem;
                margin-bottom: 0.75rem;
            }

            .fin-cronograma-card__intro {
                min-width: 0;
                flex: 1 1 auto;
            }

            .fin-cronograma-modos {
                display: inline-flex;
                flex-shrink: 0;
                border: 1px solid #cbd5e1;
                border-radius: 999px;
                overflow: hidden;
                background: #f8fafc;
            }

            .fin-cronograma-modo {
                border: 0;
                background: transparent;
                color: #475569;
                font-size: 0.72rem;
                font-weight: 700;
                padding: 0.35rem 0.65rem;
                cursor: pointer;
                white-space: nowrap;
                transition: background 0.12s ease, color 0.12s ease;
            }

            .fin-cronograma-modo + .fin-cronograma-modo {
                border-left: 1px solid #cbd5e1;
            }

            .fin-cronograma-modo.is-active {
                background: #0a8785;
                color: #fff;
            }

            .fin-cronograma-modo:focus-visible {
                outline: 2px solid #0a8785;
                outline-offset: 1px;
            }

            .fin-cronograma-card__hint {
                font-size: 0.78rem;
                color: #605e5c;
                margin: 0;
                line-height: 1.35;
            }

            .fin-cronograma-bloco + .fin-cronograma-bloco {
                margin-top: 0.85rem;
                padding-top: 0.85rem;
                border-top: 1px dashed #e2e8f0;
            }

            .fin-cronograma-bloco__cabecalho {
                margin-bottom: 0.55rem;
            }

            .fin-cronograma-bloco__titulo {
                margin: 0;
                font-size: 0.82rem;
                font-weight: 800;
                color: #252423;
            }

            .fin-cronograma-bloco--atraso .fin-cronograma-bloco__titulo {
                color: #b91c1c;
            }

            .fin-cronograma-bloco--previsao .fin-cronograma-bloco__titulo {
                color: #0a8785;
            }

            .fin-cronograma-bloco__subtitulo {
                margin: 0.12rem 0 0;
                font-size: 0.72rem;
                color: #64748b;
                line-height: 1.35;
            }

            .fin-cronograma-bloco__resumo {
                margin: 0.35rem 0 0;
                font-size: 0.74rem;
                font-weight: 600;
                color: #475569;
            }

            .fin-cronograma-lista {
                display: flex;
                flex-direction: column;
                gap: 0.45rem;
                max-height: 160px;
                overflow-y: auto;
                margin: 0;
                padding: 0;
                list-style: none;
            }

            .fin-cronograma-item {
                display: grid;
                grid-template-columns: minmax(5.5rem, 6.8rem) 1fr auto;
                gap: 0.45rem;
                align-items: center;
                font-size: 0.8rem;
            }

            .fin-cronograma-item__data {
                font-weight: 700;
                color: #0a8785;
            }

            .fin-cronograma-item--atraso .fin-cronograma-item__data {
                color: #b91c1c;
            }

            .fin-cronograma-item--atraso .fin-cronograma-item__valor {
                color: #b91c1c;
            }

            .fin-cronograma-item--atraso .fin-cronograma-item__barra-fill {
                background: linear-gradient(90deg, #f87171, #dc2626);
            }

            .fin-cronograma-item__barra {
                height: 6px;
                border-radius: 999px;
                background: #f1f5f9;
                overflow: hidden;
            }

            .fin-cronograma-item__barra-fill {
                display: block;
                height: 100%;
                border-radius: inherit;
                background: linear-gradient(90deg, #f59e0b, #d97706);
            }

            .fin-cronograma-item__valor {
                font-weight: 700;
                color: #9a3412;
                white-space: nowrap;
                text-align: right;
            }

            .fin-cronograma-item__meta {
                grid-column: 1 / -1;
                font-size: 0.72rem;
                color: #64748b;
                margin-top: -0.15rem;
            }

            .fin-cronograma-rodape {
                margin-top: 0.75rem;
                padding-top: 0.65rem;
                border-top: 1px solid #e2e8f0;
                font-size: 0.78rem;
                color: #475569;
                line-height: 1.4;
            }

            .fin-cronograma-vazio {
                font-size: 0.82rem;
                color: #64748b;
                margin: 0;
                line-height: 1.45;
            }

            .fin-badge-pendente {
                background: #fff7ed;
                border-color: #fdba74;
                color: #9a3412;
            }

            .fin-filtros-card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 4px;
                padding: 1rem 1.15rem;
                box-shadow: none;
            }

            .fin-filtros-grupo + .fin-filtros-grupo {
                margin-top: 0.85rem;
            }

            .fin-filtros-grupo__titulo {
                font-size: 0.78rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #605e5c;
                margin-bottom: 0.45rem;
            }

            .fin-filtros-chips {
                display: flex;
                flex-wrap: wrap;
                gap: 0.45rem;
            }

            .fin-chip {
                border: 1px solid #8a8886;
                background: #fff;
                color: #252423;
                border-radius: 2px;
                padding: 0.3rem 0.7rem;
                font-size: 0.8rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.12s ease;
            }

            .fin-chip:hover {
                border-color: #252423;
            }

            .fin-chip.is-active {
                background: #f3f2f1;
                border-color: #252423;
                color: #252423;
            }

            .fin-prof-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 0.5rem;
            }

            .fin-prof-card {
                border: 1px solid #c8c6c4;
                background: #fff;
                color: #252423;
                border-radius: 2px;
                padding: 0.55rem 0.75rem;
                text-align: left;
                font-size: 0.82rem;
                font-weight: 600;
                cursor: pointer;
                transition: border-color 0.12s ease, background 0.12s ease;
                white-space: normal;
                word-break: break-word;
                line-height: 1.25;
                min-height: 2.75rem;
            }

            .fin-prof-card__nome {
                display: block;
            }

            .fin-prof-card:hover {
                border-color: #8a8886;
            }

            .fin-prof-card.is-active {
                border-color: #0078d4;
                background: #deecf9;
                color: #004578;
            }

            .fin-prof-detalhe {
                margin-top: 1rem;
                padding-top: 1rem;
                border-top: 1px solid #e2e8f0;
            }

            .fin-prof-detalhe__nome {
                font-family: 'Poppins', sans-serif;
                font-size: 1rem;
                font-weight: 700;
                margin-bottom: 0.75rem;
                color: var(--fin-text);
            }

            .fin-prof-metricas {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }

            .fin-prof-metricas--com-pendente .fin-prof-metrica--destaque {
                grid-column: 1 / -1;
            }

            .fin-prof-metrica--pendente {
                background: #fff7ed;
                border-color: #fdba74;
            }

            .fin-prof-metrica--pendente .fin-prof-metrica__valor {
                color: #b45309;
            }

            .fin-prof-metrica {
                border: 1px solid #e2e8f0;
                border-radius: 12px;
                padding: 0.85rem 1rem;
                background: #f8fafc;
            }

            .fin-prof-metrica__rotulo {
                display: block;
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: var(--fin-muted);
                margin-bottom: 0.35rem;
            }

            .fin-prof-metrica__valor {
                display: block;
                font-family: 'Poppins', sans-serif;
                font-size: 1.25rem;
                font-weight: 700;
                color: #059669;
            }

            .fin-prof-metrica__meta {
                display: block;
                margin-top: 0.25rem;
                font-size: 0.82rem;
                color: var(--fin-muted);
            }

            .fin-dashboard-graficos {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
                margin-bottom: 0.75rem;
            }

            .fin-grafico-card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 4px;
                padding: 0.85rem 1rem 0.75rem;
                box-shadow: none;
            }

            .fin-grafico-card--full {
                margin-bottom: 0.75rem;
            }

            .fin-grafico-card__titulo {
                font-family: 'Segoe UI', 'Lato', sans-serif;
                font-size: 0.88rem;
                font-weight: 600;
                margin-bottom: 0.5rem;
                color: #252423;
                padding-bottom: 0.35rem;
                border-bottom: 1px solid #edebe9;
            }

            .fin-grafico-wrap {
                position: relative;
                height: 280px;
                background: #faf9f8;
                border-radius: 2px;
                padding: 0.35rem;
            }

            .fin-grafico-card--prof {
                border-radius: 14px;
                border-color: rgba(20, 184, 166, 0.22);
                box-shadow: 0 10px 28px rgba(15, 118, 110, 0.08);
                overflow: hidden;
            }

            .fin-grafico-card--prof .fin-grafico-card__head {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 0.75rem;
                margin-bottom: 0.65rem;
                padding-bottom: 0.55rem;
                border-bottom: 1px solid rgba(20, 184, 166, 0.15);
            }

            .fin-grafico-card--prof .fin-grafico-card__titulo {
                margin-bottom: 0.15rem;
                padding-bottom: 0;
                border-bottom: none;
                color: #0f766e;
                font-size: 0.95rem;
            }

            .fin-grafico-card__subtitulo {
                font-size: 0.8rem;
                color: #64748b;
            }

            .fin-grafico-wrap--bar {
                min-height: 360px;
                max-height: 85vh;
                height: 360px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
                border: 1px solid rgba(148, 163, 184, 0.18);
                border-radius: 12px;
                padding: 1rem 1rem 0.85rem;
            }

            .fin-grafico-wrap--bar canvas {
                display: block;
            }

            .fin-grafico-vazio {
                position: absolute;
                inset: 0;
                display: none;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 1rem;
                color: var(--fin-muted);
                font-size: 0.9rem;
            }

            .fin-grafico-vazio.is-visible {
                display: flex;
            }

            .fin-legenda-item {
                display: flex;
                align-items: center;
                gap: 0.45rem;
                font-size: 0.82rem;
                margin-bottom: 0.35rem;
            }

            .fin-legenda-cor {
                width: 10px;
                height: 10px;
                border-radius: 999px;
                flex-shrink: 0;
            }

            .fin-detalhe-toggle {
                color: var(--fin-text);
            }

            .fin-detalhe-toggle:hover {
                color: var(--fin-teal);
            }

            .fin-tabela-scroll {
                max-height: 320px;
                overflow-y: auto;
            }

            @media (max-width: 991px) {
                .financeiro-resumo-grid,
                .financeiro-grid-principal,
                .fin-dashboard-topo,
                .fin-dashboard-graficos {
                    grid-template-columns: 1fr !important;
                }

                .fin-grafico-wrap {
                    height: auto !important;
                    min-height: 300px;
                    max-height: none;
                }

                .fin-grafico-wrap--bar {
                    max-height: none;
                    overflow-y: auto;
                }
            }

            @media (max-width: 767px) {
                body.financeiro-page {
                    padding: 12px max(10px, env(safe-area-inset-right)) 32px max(10px, env(safe-area-inset-left));
                }

                .financeiro-card .card-body {
                    padding: 1rem;
                }

                .fin-dashboard-topo {
                    grid-template-columns: 1fr !important;
                }

                .fin-dashboard-graficos {
                    grid-template-columns: 1fr !important;
                }

                .fin-kpi-card {
                    min-height: auto;
                }

                .fin-prof-grid {
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                }

                .fin-prof-metricas {
                    grid-template-columns: 1fr;
                }

                .fin-grafico-wrap {
                    min-height: 260px;
                    max-height: none;
                    height: auto;
                    padding-bottom: 0.5rem;
                }

                .fin-grafico-wrap--bar {
                    max-height: none;
                    overflow-y: auto;
                }

                .fin-tabela-scroll {
                    max-height: none;
                    overflow-x: auto;
                    -webkit-overflow-scrolling: touch;
                }

                .financeiro-table {
                    font-size: 0.82rem;
                }

                .financeiro-table th,
                .financeiro-table td {
                    white-space: nowrap;
                }
            }

            @media (max-width: 420px) {
                .fin-prof-grid {
                    grid-template-columns: 1fr;
                }

                .fin-chip {
                    flex: 1 1 calc(50% - 0.45rem);
                    text-align: center;
