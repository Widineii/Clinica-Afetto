<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="bloco (periodicidadeAtual, retornoUrl)">
    <div class="periodicidade-resumo-card"
         id="forma-pagamento"
         th:if="${podeEscolherFormaPagamento and periodicidadeAtual != null and periodicidadesPagamento != null}">

        <div class="periodicidade-resumo-card__titulo">Forma de pagamento</div>
        <p class="periodicidade-resumo-card__hint mb-0">
            Escolha como prefere pagar. Após trocar, aguarde 24 horas para mudar de novo.
        </p>

        <form th:action="@{/agendamentos/minha-periodicidade-pagamento}" method="post" class="mt-0">
            <th:block th:replace="~{fragments/csrf :: token}"></th:block>
            <input type="hidden" name="retorno" th:value="${retornoUrl}">
            <div class="periodicidade-resumo-opcoes mt-2" role="group" aria-label="Forma de pagamento">
                <button th:each="opt : ${periodicidadesPagamento}"
                        type="submit"
                        name="periodicidade"
                        th:value="${opt.name()}"
                        class="periodicidade-resumo-btn"
                        th:classappend="${periodicidadeAtual == opt} ? ' active' : ''"
                        th:disabled="${periodicidadeAtual == opt or (podeAlterarPeriodicidadePropria != null and !podeAlterarPeriodicidadePropria)}"
                        th:attr="aria-pressed=${periodicidadeAtual == opt}"
                        th:text="${opt.rotulo}">Diário</button>
            </div>
        </form>

        <p class="periodicidade-resumo-card__bloqueio mb-0"
           th:if="${mensagemBloqueioPeriodicidade != null and !#strings.isEmpty(mensagemBloqueioPeriodicidade)}"
           th:text="${mensagemBloqueioPeriodicidade}">
            Você poderá alterar novamente em 30/05 às 14:00.
        </p>

        <p class="periodicidade-resumo-card__descricao mb-0" th:text="${periodicidadeAtual.descricao}">
            Paga na véspera de cada consulta (D-1)
        </p>

        <div class="periodicidade-resumo-card__pendencia mt-3"
             th:if="${resumoPendenciasPagamento != null and resumoPendenciasPagamento.quantidade > 0}">
            <strong class="text-danger">Pagamentos em aberto:</strong>
            <span th:text="${resumoPendenciasPagamento.quantidade}">0</span>
            <span th:text="${resumoPendenciasPagamento.quantidade == 1 ? ' item' : ' itens'}"> itens</span>
            — total
            <span class="periodicidade-resumo-card__pendencia-valor"
                  th:text="${resumoPendenciasPagamento.valorTotalFormatado}">R$ 0,00</span>.
            <a th:href="${resumoPendenciasPagamento.urlMeusPagamentos}" class="fw-bold ms-1">Resolver agora</a>
        </div>
    </div>
</div>
</body>
</html>
