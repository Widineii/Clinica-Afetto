<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="botao-whatsapp">
    <a th:if="${exibirWhatsappSuporte}"
       th:href="${manualWhatsappUrl}"
       class="btn btn-sm btn-success d-inline-flex align-items-center gap-2"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="Falar com suporte no WhatsApp">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.881 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Falar com suporte
        <span class="badge rounded-pill text-bg-light text-success border border-success"
              th:if="${suporteContrato != null and suporteContrato.ativo()}"
              th:text="${suporteContrato.contadorTexto()}">3 meses</span>
    </a>
</th:block>

<div th:fragment="rodape" class="ajuda-suporte-rodape card shell-card mt-3">
    <div class="card-body py-3 px-4">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
            <p class="small text-muted mb-0">
                <strong class="text-dark">Precisa de ajuda?</strong>
                Se tiver dificuldade,
                <a th:href="@{/agendamentos/manual}" class="fw-semibold">acesse o manual</a>.
                Se tiver problema com o site, entre em contato com o suporte.
            </p>
            <div class="d-flex flex-wrap align-items-center gap-2 flex-shrink-0">
                <a th:href="@{/agendamentos/manual}" class="btn btn-sm btn-outline-primary">
                    Abrir manual
                </a>
                <th:block th:replace="~{fragments/ajuda-suporte :: botao-whatsapp}"></th:block>
            </div>
        </div>
        <div th:replace="~{fragments/site-versao :: badge}"></div>
    </div>
</div>

<div th:fragment="rodape-agenda" class="ajuda-suporte-rodape border-top pt-3 mt-4">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
        <p class="small text-muted mb-0">
            <strong class="text-dark">Precisa de ajuda?</strong>
            Com dificuldade,
            <a th:href="@{/agendamentos/manual}" class="fw-semibold">acesse o manual</a>.
            Problema no site? Fale com o suporte pelo WhatsApp.
        </p>
        <div class="d-flex flex-wrap align-items-center gap-2 flex-shrink-0">
            <a th:href="@{/agendamentos/manual}" class="btn btn-sm btn-outline-primary">Manual</a>
            <th:block th:replace="~{fragments/ajuda-suporte :: botao-whatsapp}"></th:block>
        </div>
    </div>
    <div class="site-versao">
        <span class="site-versao__pill" th:text="${versaoSiteRotulo}">Versão do site 2.49</span>
    </div>
</div>
</body>
</html>
