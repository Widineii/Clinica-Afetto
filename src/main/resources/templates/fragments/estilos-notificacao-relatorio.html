<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="css">
        <th:block th:replace="~{fragments/afetto-paleta :: css}"></th:block>
        <style>
            .hero-band {
                overflow: visible;
            }

            .hero-band .top-actions,
            .hero-band .afetto-top-actions {
                overflow: visible;
                position: relative;
                z-index: 4;
            }

            .afetto-hero-stack {
                align-items: flex-start !important;
            }

            @media (min-width: 1200px) {
                .hero-band__brand {
                    flex: 0 1 min(36%, 26rem);
                    max-width: min(36%, 26rem);
                }

                .afetto-top-actions {
                    flex: 1 1 auto;
                    justify-content: flex-start;
                    align-content: flex-start;
                    padding-left: 0.25rem;
                    padding-right: 0.25rem;
                }

                .afetto-top-actions .notif-bell-wrap {
                    order: 99;
                    margin-left: auto;
                    align-self: flex-start;
                }
            }

            .notif-bell-wrap {
                position: relative;
                flex-shrink: 0;
            }

            .notif-bell-wrap .dropdown-toggle::after {
                display: none;
            }

            .notif-bell-wrap .dropdown-menu {
                z-index: 1080;
                margin-top: 0.65rem;
                inset: auto 0 auto auto !important;
                transform: none !important;
            }

            .btn-notif-bell {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 44px;
                min-height: 44px;
                padding: 0.5rem;
                border-radius: 12px;
            }

            .notif-bell-badge {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--afetto-teal);
                border: 2px solid #fff;
                box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08);
            }

            .notif-bell-panel {
                width: min(340px, calc(100vw - 24px));
                border: 0;
                border-radius: 16px;
                padding: 1rem 1.1rem 1.35rem;
                max-height: min(70vh, 460px);
                overflow-y: auto;
                box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
            }

            .notif-bell-kicker {
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--afetto-teal-dark);
            }

            .notif-bell-title {
                font-size: 1rem;
                font-weight: 700;
                color: #0f172a;
                line-height: 1.35;
            }

            .notif-bell-text {
                font-size: 0.9rem;
                color: #475569;
                line-height: 1.45;
                margin-bottom: 0;
            }

            .notif-bell-data {
                font-size: 1.05rem;
                font-weight: 700;
                color: var(--afetto-teal-dark);
                line-height: 1.3;
            }

            .notif-bell-empty {
                font-size: 0.95rem;
                color: #64748b;
                line-height: 1.45;
            }

            .notif-bell-divider {
                border-color: #e2e8f0;
                opacity: 1;
            }

            .notif-bell-list {
                display: grid;
                gap: 0.75rem;
                margin-bottom: 0.85rem;
            }

            .notif-bell-item {
                padding: 0.75rem 0.85rem;
                border-radius: 12px;
                background: #f8fafc;
                border: 1px solid #e2e8f0;
            }

            .notif-bell-more {
                font-size: 0.82rem;
                color: #64748b;
            }

            .notif-bell-action {
                margin-bottom: 0;
            }

            @media (max-width: 1199.98px) {
                .notif-bell-wrap .dropdown-menu {
                    left: auto !important;
                    right: 0 !important;
                    transform: none !important;
                }

                .notif-bell-panel {
                    width: min(20rem, calc(100vw - 1.5rem)) !important;
                    max-width: calc(100vw - 1.5rem) !important;
                }
            }
        </style>
    </th:block>
</head>
<body></body>
</html>
