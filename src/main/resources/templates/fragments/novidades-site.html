<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="listaItens (novidades, isDonaClinica)">
    <p th:if="${#lists.isEmpty(novidades)}" class="text-muted small mb-0">
        Nenhuma novidade pendente no momento.
    </p>
    <div th:each="novidade : ${novidades}" class="novidade-item mb-3 pb-3 border-bottom">
        <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
            <span class="badge text-bg-primary" th:text="'v' + ${novidade.versao}">v2.480</span>
            <span class="badge text-bg-light text-secondary border"
                  th:if="${isDonaClinica and novidade.publicoAlvo.name() == 'PROFISSIONAL'}"
                  th:text="${novidade.publicoAlvoRotulo}">Profissionais</span>
            <span class="small text-muted" th:text="${novidade.dataPublicacaoRotulo}">01/06/2026</span>
        </div>
        <h3 class="h6 mb-1" th:text="${novidade.titulo}">Título</h3>
        <p class="small text-muted mb-0" th:text="${novidade.descricao}">Descrição</p>
    </div>
</div>

<div th:fragment="lista (novidades, diasExibicao, isDonaClinica)">
    <div th:replace="~{fragments/novidades-site :: listaItens(novidades=${novidades}, isDonaClinica=${isDonaClinica})}"></div>
    <p th:unless="${#lists.isEmpty(novidades)}"
       class="small text-muted mb-0 mt-2"
       th:text="'Sem marcar a opção abaixo, estas novidades somem sozinhas após ' + ${diasExibicao} + ' dias da primeira visualização.'">
        Dica de exibição
    </p>
</div>

<div th:fragment="modal (novidades, diasExibicao, isDonaClinica)">
    <div class="modal fade" id="novidadesModal" tabindex="-1" aria-labelledby="novidadesModalTitulo" aria-hidden="true"
         th:if="${novidades != null and !#lists.isEmpty(novidades)}">
        <div class="modal-dialog modal-dialog-scrollable modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <p class="text-uppercase small text-muted mb-1 fw-semibold">Novidades do sistema</p>
                        <h2 class="modal-title h5 mb-0" id="novidadesModalTitulo">O que mudou recentemente</h2>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar" id="novidadesModalFechar"></button>
                </div>
                <div class="modal-body pt-3">
                    <p class="small text-muted mb-2" th:if="${isDonaClinica}">
                        Você vê <strong>todas</strong> as atualizações — para profissionais e para a clínica.
                    </p>
                    <div th:replace="~{fragments/novidades-site :: listaItens(novidades=${novidades}, isDonaClinica=${isDonaClinica})}"></div>
                    <th:block th:each="novidade : ${novidades}">
                        <input form="novidadesDispensarForm" type="hidden" name="novidadeIds" th:value="${novidade.id}">
                    </th:block>
                </div>
                <div class="modal-footer flex-column align-items-stretch gap-2 border-0 pt-0">
                    <p class="small text-muted mb-0 text-start"
                       th:text="'Sem marcar a opção abaixo, estas novidades somem sozinhas após ' + ${diasExibicao} + ' dias da primeira visualização.'">
                        Dica de exibição
                    </p>
                    <form id="novidadesDispensarForm"
                          th:action="@{/agendamentos/novidades/dispensar}"
                          method="post"
                          class="w-100 d-flex flex-column gap-2">
                        <th:block th:replace="~{fragments/csrf :: token}"></th:block>
                        <input type="hidden" name="retorno" value="/agendamentos/dashboard">
                        <div class="form-check text-start">
                            <input class="form-check-input" type="checkbox" name="naoMostrarMais" value="true" id="novidadesNaoMostrarMais">
                            <label class="form-check-label small" for="novidadesNaoMostrarMais">
                                Não mostrar estas novidades de novo
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entendi</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
