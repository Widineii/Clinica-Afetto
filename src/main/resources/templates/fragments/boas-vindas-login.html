<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal"
     th:if="${exibirModalBoasVindasLogin == true and boasVindasLogin != null}"
     class="modal fade admin-modal boas-vindas-login-modal"
     id="boasVindasLoginModal"
     tabindex="-1"
     aria-labelledby="boasVindasLoginModalTitulo"
     aria-hidden="true"
     data-bs-backdrop="static"
     data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header border-0 pb-2 px-4 pt-4">
                <div class="w-100 text-center">
                    <p class="boas-vindas-login-modal__data text-muted small mb-2"
                       th:text="${boasVindasLogin.dataHojeFormatada}">Terça-feira, 23 de junho</p>
                    <h2 class="modal-title h3 mb-0" id="boasVindasLoginModalTitulo">
                        <span th:text="${boasVindasLogin.saudacao}">Bom dia</span>,
                        <span class="boas-vindas-login-modal__nome"
                              th:text="${boasVindasLogin.primeiroNome}">Maria</span>!
                    </h2>
                </div>
            </div>
            <div class="modal-body px-4 pb-2 pt-1">
                <div th:if="${boasVindasLogin.semAtendimentos()}" class="text-center py-3">
                    <p class="mb-0 text-muted"
                       th:text="${boasVindasLogin.atendimentosDeAmanha()}
                           ? 'Amanhã você não tem atendimentos agendados.'
                           : 'Hoje você não tem atendimentos agendados.'">
                        Hoje você não tem atendimentos agendados.
                    </p>
                    <p class="small text-muted mb-0 mt-2">Bom trabalho na clínica!</p>
                </div>
                <div th:unless="${boasVindasLogin.semAtendimentos()}">
                    <h3 class="boas-vindas-login-modal__secao-titulo text-center"
                        th:text="${boasVindasLogin.atendimentosDeAmanha()} ? 'Atendimentos de amanhã' : 'Atendimentos do dia'">
                        Atendimentos do dia
                    </h3>
                    <div class="boas-vindas-login-modal__salas">
                        <section th:each="blocoSala : ${boasVindasLogin.salasComAtendimentos}"
                                 class="boas-vindas-login-modal__sala-bloco">
                            <h4 class="boas-vindas-login-modal__sala-nome"
                                th:text="${blocoSala.sala}">Sala 1</h4>
                            <ul class="list-unstyled boas-vindas-login-modal__clientes mb-0">
                                <li th:each="cliente : ${blocoSala.clientes}"
                                    class="boas-vindas-login-modal__cliente-linha">
                                    <span class="boas-vindas-login-modal__cliente-nome"
                                          th:text="${cliente.cliente}">Cliente</span>
                                    <span class="boas-vindas-login-modal__cliente-horario"
                                          th:text="${cliente.horario}">14:00 – 15:00</span>
                                </li>
                            </ul>
                        </section>
                    </div>
                </div>
            </div>
            <div class="modal-footer flex-column align-items-stretch gap-2 border-0 px-4 pb-4 pt-2">
                <div class="form-check text-start mb-1">
                    <input class="form-check-input"
                           type="checkbox"
                           id="boasVindasLoginNaoMostrarHoje"
                           name="naoMostrarMaisHoje"
                           value="true">
                    <label class="form-check-label small text-muted" for="boasVindasLoginNaoMostrarHoje">
                        Não mostrar mais hoje
                    </label>
                </div>
                <button type="button"
                        class="btn btn-teal btn-lg w-100"
                        id="boasVindasLoginContinuar">
                    Ver minha agenda
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
