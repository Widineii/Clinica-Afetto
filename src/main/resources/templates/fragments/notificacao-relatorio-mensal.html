<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sino">
    <div class="dropdown notif-bell-wrap"
         th:with="temNotifEncerramento=${exibirBolinhaNotificacaoEncerramento == true},
                  temNotifPagamento=${exibirBolinhaNotificacaoPagamento == true},
                  temNotifNovoAgendamento=${exibirBolinhaNotificacaoNovoAgendamento == true},
                  temAlgumaNotif=${temNotifEncerramento or temNotifPagamento or temNotifNovoAgendamento}">
        <button type="button"
                class="btn btn-light btn-notif-bell position-relative dropdown-toggle"
                data-bs-toggle="dropdown"
                data-bs-auto-close="outside"
                data-bs-display="static"
                aria-expanded="false"
                th:attr="aria-label=${temAlgumaNotif} ? 'Você tem notificações pendentes' : 'Notificações'"
                title="Notificacoes">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10 3.17 10 4v.68C7.13 5.36 5.5 7.92 5.5 11v5l-2 2v1h17v-1l-2-2z"/>
            </svg>
            <span th:if="${temAlgumaNotif}"
                  class="notif-bell-badge"
                  aria-hidden="true"></span>
        </button>
        <div class="dropdown-menu dropdown-menu-end shadow notif-bell-panel">
            <th:block th:if="${temNotifNovoAgendamento}">
                <p class="notif-bell-kicker mb-1">Novos agendamentos</p>
                <p class="notif-bell-text mb-2"
                   th:if="${totalNotificacoesNovosAgendamentos > 1}"
                   th:text="|${totalNotificacoesNovosAgendamentos} agendamentos novos na clínica|">
                    3 agendamentos novos
                </p>
                <div class="notif-bell-list">
                    <article class="notif-bell-item"
                             th:each="notif : ${notificacoesNovosAgendamentos}">
                        <p class="notif-bell-title mb-1" th:text="${notif.mensagemResumo}">Resumo</p>
                        <p class="notif-bell-text mb-0" th:text="${notif.mensagemDetalhe}">Detalhes</p>
                    </article>
                </div>
                <p class="notif-bell-more mb-2"
                   th:if="${totalNotificacoesNovosAgendamentos > #lists.size(notificacoesNovosAgendamentos)}"
                   th:text="|+ ${totalNotificacoesNovosAgendamentos - #lists.size(notificacoesNovosAgendamentos)} notificação(ões) anterior(es)|">
                    + 2 anteriores
                </p>
                <a th:href="@{/agendamentos/dashboard(viaNotificacaoNovoAgendamento=true)}"
                   class="btn btn-teal w-100 notif-bell-action"
                   th:classappend="${temNotifPagamento or temNotifEncerramento} ? ' mb-3' : ''">
                    Ver na agenda
                </a>
            </th:block>
            <th:block th:if="${temNotifPagamento}">
                <hr th:if="${temNotifNovoAgendamento}" class="notif-bell-divider my-3">
                <p class="notif-bell-kicker mb-1">Pagamento</p>
                <p class="notif-bell-title mb-2"
                   th:text="${notificacaoPagamentoProfissional.mensagemResumo}">Pagamento pendente</p>
                <p class="notif-bell-data mb-2"
                   th:if="${notificacaoPagamentoProfissional.rotuloData != null}"
                   th:text="${notificacaoPagamentoProfissional.rotuloData}">29/05/2026</p>
                <p class="notif-bell-text mb-3"
                   th:text="${notificacaoPagamentoProfissional.mensagemPainel}">Detalhes</p>
                <a th:href="${notificacaoPagamentoProfissional.urlMeusPagamentos}"
                   class="btn btn-warning w-100 notif-bell-action"
                   th:classappend="${temNotifEncerramento} ? ' mb-3' : ''">
                    Ir para pagamentos
                </a>
            </th:block>
            <th:block th:if="${temNotifEncerramento}">
                <hr th:if="${temNotifPagamento or temNotifNovoAgendamento}" class="notif-bell-divider my-3">
                <p class="notif-bell-kicker mb-1">Encerramento de série</p>
                <p class="notif-bell-title mb-2"
                   th:text="${notificacaoEncerramentoSerie.mensagemResumo}">Alguém encerrou série</p>
                <p class="notif-bell-text mb-3"
                   th:text="${notificacaoEncerramentoSerie.mensagemPainel}">Detalhes</p>
                <a th:href="@{/agendamentos/central-profissionais(aba='encerramentos',viaNotificacaoEncerramento=true)}"
                   class="btn btn-teal w-100 notif-bell-action">
                    Ver encerramentos
                </a>
            </th:block>
            <th:block th:unless="${temAlgumaNotif}">
                <p class="notif-bell-kicker mb-1">Notificacoes</p>
                <p class="notif-bell-empty mb-0">Não tem notificação.</p>
            </th:block>
        </div>
    </div>
</th:block>
</body>
</html>
