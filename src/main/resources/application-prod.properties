server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Neon (serverless): pool pequeno; use DATABASE_URL com host -pooler no Railway.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=240000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=120000
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Menos linhas no dashboard (local usa 4 meses; prod carrega 2 — suficiente para series e pagas recentes).
app.agenda.meses-historico=2

server.tomcat.threads.max=40
server.tomcat.accept-count=40
server.tomcat.max-connections=120

# Pool e JPA (URL do banco vem de PostgresDataSourceConfig + DATABASE_URL / PGHOST)
spring.jpa.show-sql=false
spring.thymeleaf.cache=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# none = sobe rapido no Railway; colunas novas via PostgresSchemaPatch (nao Hibernate update a cada deploy).
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

app.seed-carga-inicial-fixos=false
app.seed-sincronizar-usuarios-padrao-on-startup=false
app.seed-test-user.reset-password-on-startup=false

logging.level.org.hibernate=WARN

app.seed-demo-data=false
app.seed-admin-login=${ADMIN_LOGIN:}
app.seed-admin-password=${ADMIN_PASSWORD:}
app.seed-admin-name=${ADMIN_NAME:Administracao}

# Perfil de teste no ar (login teste / senha 297b). Desligue com SEED_TEST_USER_ENABLED=false
app.seed-test-user.enabled=${SEED_TEST_USER_ENABLED:true}
app.seed-test-user.login=${SEED_TEST_USER_LOGIN:teste}
app.seed-test-user.password=${SEED_TEST_USER_PASSWORD:297b}
app.seed-test-user.name=${SEED_TEST_USER_NAME:Perfil Teste}
app.seed-test-user.reset-password-on-startup=${SEED_TEST_USER_RESET_PASSWORD:false}

# Isento de taxa/PIX apenas se true (padrao false; local usa true em application-local.properties)
app.seed-test-user.isento-pagamento=${SEED_TEST_USER_ISENTO_PAGAMENTO:false}

management.health.db.enabled=true

app.infinitepay.modo-teste=false
app.infinitepay.handle=${APP_INFINITEPAY_HANDLE:${INFINITEPAY_HANDLE:afettopsicologia}}
app.infinitepay.base-url=${APP_INFINITEPAY_BASE_URL:${INFINITEPAY_BASE_URL:https://clinica-agenda-production-e992.up.railway.app}}
app.pagamento.webhook-secret=${PAGAMENTO_WEBHOOK_SECRET:}

clinica.financeiro.polyana.enabled=true

app.whatsapp.meta.enabled=${WHATSAPP_ENABLED:false}
app.whatsapp.meta.access-token=${WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.meta.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.meta.webhook-verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
