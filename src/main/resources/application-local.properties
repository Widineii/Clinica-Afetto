# WHATSAPP_TEMPLATE_LEMBRETE=lembrete_consulta
# WHATSAPP_AVISO_PAGAMENTO=true

# Pagamento InfinitePay (modo teste local)
# Suporte WhatsApp no manual (DDI + DDD + numero, so digitos)
app.manual.whatsapp-numero=5537998550994
app.manual.whatsapp-numero-clinica=553182835857

# Video no manual: embed YouTube ou arquivo em src/main/resources/static/videos/
# Ex.: app.manual.video-url=https://www.youtube.com/embed/SEU_ID
# Ex.: app.manual.video-url=/videos/manual-amostra.mp4

app.infinitepay.modo-teste=true
app.infinitepay.handle=afetto-teste
app.infinitepay.base-url=http://localhost:8081

app.pagamento.prazo-confirmacao-minutos=15
app.pagamento.hora-limite-pagamento-vespera=23:59
# Vazio em local com modo teste; preencher ao testar webhook manualmente
app.pagamento.webhook-secret=

# Gestao financeira (piloto Polyana - local)
clinica.financeiro.polyana.enabled=true

# Ultimos N dias visiveis para cancelar/realocar retroativo (admin/dona)
app.agenda.dias-historico-gestao=14

# Troca de senha no primeiro login (false desliga o modal obrigatorio)
app.seguranca.exigir-troca-senha-primeiro-acesso=true

# Recuperacao de senha — remetente widineimartins4@gmail.com (Gmail SMTP)
# Depois: trocar MAIL_USERNAME para afettopsicologiaesaude@gmail.com
# 1) Crie senha de app: https://myaccount.google.com/apppasswords
# 2) copy scripts\local-mail.env.example scripts\local-mail.env e preencha MAIL_PASSWORD
# 3) Antes de subir: set RECUPERACAO_SENHA_MODO_CONSOLA=false (ou no local-mail.env)
app.recuperacao-senha.enabled=true
app.recuperacao-senha.modo-consola=${RECUPERACAO_SENHA_MODO_CONSOLA:true}
app.recuperacao-senha.codigo-expiracao-minutos=15
app.recuperacao-senha.remetente-nome=Agenda Afetto
app.recuperacao-senha.remetente-email=${MAIL_USERNAME:widineimartins4@gmail.com}
app.recuperacao-senha.url-site=http://localhost:8081

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:widineimartins4@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Teste visual: simula 5 pessoas online no menu (desligar antes de publicar)
app.presenca-online.demo-local=true
