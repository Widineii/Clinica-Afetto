server.port=8081

# false em local para ver alteracoes de HTML sem reiniciar o servidor
spring.thymeleaf.cache=false
# CSS/imagens do login atualizam sem precisar limpar cache do navegador
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

server.error.include-message=always

spring.datasource.url=jdbc:h2:file:./data/clinica-local;AUTO_SERVER=TRUE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed-demo-data=false
app.seed-carga-inicial-fixos=false
# Desligado para uso real: relatorio mensal so no dia 3 (como em producao)
app.relatorio-mensal.auto-fechamento-local=false
app.seed-admin-login=admin
app.seed-admin-password=${APP_SEED_ADMIN_PASSWORD:Luquinha12@}
app.seed-admin-name=Administrador do Sistema

# Perfil de teste (login teste / senha 297b — isento de pagamento so no local)
app.seed-test-user.enabled=true
app.seed-test-user.login=teste
app.seed-test-user.password=297b
app.seed-test-user.name=Perfil Teste
app.seed-test-user.reset-password-on-startup=true
app.seed-test-user.exigir-troca-senha=false
app.seed-test-user.isento-pagamento=true

# Preenche avulso/semanal/quinzenal=35 e mensal=32 nos profissionais sem valor cadastrado
app.seed-valores-consulta-padrao=true

# WhatsApp Meta (numero da clinica) — ligue quando tiver token e phone-number-id:
# WHATSAPP_ENABLED=true
# WHATSAPP_ACCESS_TOKEN=...
# WHATSAPP_PHONE_NUMBER_ID=...
# WHATSAPP_WEBHOOK_VERIFY_TOKEN=...
# WHATSAPP_TEMPLATE_LEMBRETE=lembrete_consulta

# Pagamento InfinitePay (modo teste local)
# Suporte WhatsApp no manual (DDI + DDD + numero, so digitos)
app.manual.whatsapp-numero=5537998550994
app.manual.whatsapp-numero-clinica=553182835857

# Video no manual: embed YouTube ou arquivo em src/main/resources/static/videos/
# Ex.: app.manual.video-url=https://www.youtube.com/embed/SEU_ID
# Ex.: app.manual.video-url=/videos/manual-amostra.mp4

app.infinitepay.modo-teste=true
app.infinitepay.handle=afetto-teste
app.infinitepay.base-url=http://localhost:8081

app.pagamento.prazo-confirmacao-minutos=8
app.pagamento.hora-limite-pagamento-vespera=23:59
# Vazio em local com modo teste; preencher ao testar webhook manualmente
app.pagamento.webhook-secret=

# Gestao financeira (piloto Polyana - local)
clinica.financeiro.polyana.enabled=true

# Ultimos N dias visiveis para cancelar/realocar retroativo (admin/dona)
app.agenda.dias-historico-gestao=14

# Troca de senha no primeiro login (false desliga o modal obrigatorio)
app.seguranca.exigir-troca-senha-primeiro-acesso=true
