server.port=8081

# true acelera telas; mude para false se estiver editando HTML e nao ver mudancas
spring.thymeleaf.cache=true

server.error.include-message=always

spring.datasource.url=jdbc:h2:file:./data/clinica-local;AUTO_SERVER=TRUE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed-demo-data=false
app.seed-carga-inicial-fixos=false
# Desligado para uso real: relatorio mensal so no dia 3 (como em producao)
app.relatorio-mensal.auto-fechamento-local=false
app.seed-admin-login=admin
app.seed-admin-password=${APP_SEED_ADMIN_PASSWORD:Luquinha12@}
app.seed-admin-name=Administrador do Sistema

# Pagamento InfinitePay (modo teste local)
# Suporte WhatsApp no manual (DDI + DDD + numero, so digitos)
app.manual.whatsapp-numero=5537998550994

# Video no manual: embed YouTube ou arquivo em src/main/resources/static/videos/
# Ex.: app.manual.video-url=https://www.youtube.com/embed/SEU_ID
# Ex.: app.manual.video-url=/videos/manual-amostra.mp4

app.infinitepay.modo-teste=true
app.infinitepay.handle=afetto-teste
app.infinitepay.base-url=http://localhost:8081

app.pagamento.prazo-confirmacao-minutos=5
app.pagamento.hora-limite-pagamento-vespera=23:59
# Vazio em local com modo teste; preencher ao testar webhook manualmente
app.pagamento.webhook-secret=

# Gestao financeira (piloto Polyana - local)
clinica.financeiro.polyana.enabled=true
