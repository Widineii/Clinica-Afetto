name: Deploy KingHost

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-kinghost
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Validar secrets
        id: secrets
        env:
          KINGHOST_HOST: ${{ secrets.KINGHOST_HOST }}
          KINGHOST_USER: ${{ secrets.KINGHOST_USER }}
          KINGHOST_SSH_KEY: ${{ secrets.KINGHOST_SSH_KEY }}
        run: |
          if [ -z "$KINGHOST_HOST" ] || [ -z "$KINGHOST_USER" ] || [ -z "$KINGHOST_SSH_KEY" ]; then
            echo "Secrets KINGHOST_HOST, KINGHOST_USER ou KINGHOST_SSH_KEY nao configurados."
            echo "Configure em GitHub > Settings > Secrets and variables > Actions."
            echo "Deploy automatico ignorado nesta execucao."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Atualizar app no VPS
        if: steps.secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.KINGHOST_HOST }}
          username: ${{ secrets.KINGHOST_USER }}
          key: ${{ secrets.KINGHOST_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/clinica-afetto
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-kinghost.sh
            ./scripts/deploy-kinghost.sh
