name: Deploy Railway

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy no Railway
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "RAILWAY_DEPLOY_HOOK nao configurado — faca Redeploy manual no painel Railway."
            exit 0
          fi
          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK"
